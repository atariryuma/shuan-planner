<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ルーズリーフ">
  <defs>
    <linearGradient id="lf-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5ea0f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="lf-sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3fb"/>
    </linearGradient>
  </defs>
  <!-- squircle 背景 -->
  <rect width="512" height="512" rx="114" fill="url(#lf-bg)"/>
  <!-- 紙の影(奥行き) -->
  <rect x="120" y="98" width="278" height="330" rx="22" fill="#13317a" opacity="0.18"/>
  <!-- ルーズリーフの紙 -->
  <rect x="116" y="88" width="278" height="330" rx="22" fill="url(#lf-sheet)"/>
  <!-- 赤いマージン線 -->
  <rect x="184" y="116" width="5" height="276" rx="2.5" fill="#f0a6a6"/>
  <!-- 罫線 -->
  <g fill="#c9dcf6">
    <rect x="208" y="160" width="150" height="7" rx="3.5"/>
    <rect x="208" y="208" width="150" height="7" rx="3.5"/>
    <rect x="208" y="256" width="150" height="7" rx="3.5"/>
    <rect x="208" y="304" width="116" height="7" rx="3.5"/>
    <rect x="208" y="352" width="138" height="7" rx="3.5"/>
  </g>
  <!-- 綴じ穴(背景へ抜く) -->
  <g fill="url(#lf-bg)">
    <circle cx="148" cy="162" r="15"/>
    <circle cx="148" cy="253" r="15"/>
    <circle cx="148" cy="344" r="15"/>
  </g>
</svg>
