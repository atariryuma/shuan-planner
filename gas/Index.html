  if (memo) {
    memo.addEventListener('input', () => {
      const w = store.getWeek(weekStart, true);
      if (!Array.isArray(w.dayNotes)) w.dayNotes = ['', '', '', '', '', ''];
      w.dayNotes[Number(memo.dataset.day)] = memo.value;
      store.commit();
    });
  }
}

/** 2つのコマの中身を入れ替える(片方が空なら移動になる)。無効な校時へは移動させない */
// コマの中身を入れ替える(空の移動先なら実質「移動」)。他の週へも移動できる(fromとtoの週が違ってよい)。
function swapCells(fromWeekStart, from, toWeekStart, to) {
  const s = store.settings;
  const wFrom = store.getWeek(fromWeekStart, true);
  const wTo = store.getWeek(toWeekStart, true);
  const fromP = s.periods.find(p => p.id === String(from.period));
  const toP = s.periods.find(p => p.id === String(to.period));
  if (!fromP || !toP
    || !effectivePeriod(s, wFrom, Number(from.day), fromP)
    || !effectivePeriod(s, wTo, Number(to.day), toP)) {
    toast('この日の日課にない校時です', 'error');
    return false;
  }
  const kFrom = cellKey(from.day, from.period);
  const kTo = cellKey(to.day, to.period);
  if (fromWeekStart === toWeekStart && kFrom === kTo) return false;
  store.snapshot('コマの移動');
  const a = wFrom.cells[kFrom], b = wTo.cells[kTo];
  if (a) wTo.cells[kTo] = a; else delete wTo.cells[kTo];   // 移動元 → 移動先
  if (b) wFrom.cells[kFrom] = b; else delete wFrom.cells[kFrom]; // 移動先にあった分 → 移動元(空なら移動元は空に)
  store.commit();
  return true;
}

// ---------------------------------------------------------------- セル編集モーダル

// 予定・活動(会議・委員会・クラブなど)でよく使うもの。ワンタップで入れられる(自由入力も可)。
const MEMO_PRESETS = ['会議', '委員会', 'クラブ', '面談', '出張', '研修'];

function openCellEditor(weekStart, dayIdx, periodId, ctx) {
  const s = store.settings;
  const period = s.periods.find(p => p.id === periodId);
  const monday = parseDate(weekStart);
  const date = addDays(monday, dayIdx);
  const title = `${fmtMD(date)}(${DAY_NAMES[dayIdx]}) ${period?.label || ''}${period?.type === 'module' ? '' : '校時'}`;

  // 「取り消す」用に、開いた時点のセル状態を控える(編集を破棄してこの状態へ戻せる)
  const editKey = cellKey(dayIdx, periodId);
  const openCellJSON = JSON.stringify(store.state.weeks[weekStart]?.cells?.[editKey] ?? null);
  let discarded = false;
  let closeModal = null; // 本文内ボタン(移動など)から閉じるために setup で受け取る

  // 専科で事前充填(担当教科入り)したエントリのid。ユーザー操作がないまま
  // 閉じた場合はcleanupで除去する(開いて閉じるだけで授業が登録されないように)
  const prefilled = new Set();

  const ensureLesson = () => {
    const w = store.getWeek(weekStart, true);
    const key = cellKey(dayIdx, periodId);
    if (!w.cells[key]) w.cells[key] = { entries: [] };
    const cell = w.cells[key];
    if (s.mode === 'fukushiki') {
      for (const g of s.fukushikiGrades) {
        if (!cell.entries.some(e => e.scope === g)) {
          const e = newEntry();
          e.scope = g;
          cell.entries.push(e);
        }
      }
      cell.entries.sort((a, b) => (a.scope || 0) - (b.scope || 0));
    } else if (!cell.entries.length) {
      const e = newEntry();
      if (s.mode === 'senka') {
        e.scope = validScope(s, ctx.lastScope) ?? s.senkaClasses[0]?.id ?? null;
        // 担当教科も学級ID(validScope)と同様に実在チェック。削除済みキーを充填すると
        // そのコマの時数が集計・印刷・CSV・メールから無言で消えるため
        e.subjectKey = s.subjects.some(x => x.key === s.senkaSubject) ? s.senkaSubject : '';
        if (e.subjectKey) prefilled.add(e.id);
      }
      cell.entries.push(e);
    }
    return cell;
  };

  // 予定・活動(会議・委員会・クラブ等)にする: 先頭entryを「教科なし・時数に数えない活動」へ。
  // 授業固有の状態(中止/差し込み/単元切上げ/分数時数/複式指導形態など)は活動では意味を持たないので全て初期化する。
  const makeActivity = () => {
    const w = store.getWeek(weekStart, true);
    const key = cellKey(dayIdx, periodId);
    const cell = w.cells[key] || (w.cells[key] = { entries: [] });
    let e = cell.entries[0];
    if (!e) e = newEntry();
    cell.entries = [e];                     // 2件目以降(他学級)は活動化で畳む
    prefilled.delete(e.id);
    e.subjectKey = ''; e.scope = null; e.pin = null; e.offplan = false;
    e.noCount = true; e.override = null; e.text = ''; e.auto = true;
    e.unitName = e.unitName || ''; e.nth = 0; e.unitHours = 0;
    e.cancelled = false; e.cancelledText = ''; e.endUnit = false; e.fraction = 1; e.guide = null; e.advance = null;
    return e;
  };

  // 活動→授業に戻す: 先頭entryの活動属性を外し、教科を選べる授業entryへ(専科は既定教科を充填=ensureと同じ)。
  const makeLesson = () => {
    const e = store.getCell(weekStart, dayIdx, periodId)?.entries?.[0];
    if (!e) return;
    e.noCount = false; e.unitName = ''; e.nth = 0; e.unitHours = 0;
    if (s.mode === 'senka') {
      e.subjectKey = s.subjects.some(x => x.key === s.senkaSubject) ? s.senkaSubject : '';
      if (e.scope == null) e.scope = validScope(s, ctx.lastScope) ?? s.senkaClasses[0]?.id ?? null;
      if (e.subjectKey) prefilled.add(e.id);
    }
  };

  // 空きコマもタップで授業エディタを直接開く(タップ＝すぐ授業入力)。会議等は⋯の「予定・活動にする」で切替。
  ensureLesson();

  const render = (modal) => {
    const state = store.state;
    const ordinals = computeOrdinals(state, weekStart);
    const cellNow = store.getCell(weekStart, dayIdx, periodId) || { entries: [] };
    // 複式: 両学年へまとめて教科をセットする共通パレット
    const commonPalette = s.mode === 'fukushiki' ? `
      <div class="field">
        <label>教科(両学年)${infoHTML('両学年に同じ教科を入れます。学年ごとに変えるときは下の各学年で選び直してください')}</label>
        <div class="subject-palette" data-common-palette>${s.subjects.map(x =>
          `<button data-subj="${esc(x.key)}" style="background:${esc(x.color)}">${esc(x.short || x.name)}</button>`).join('')}</div>
      </div>` : '';
    // コマ=授業(教科あり) or 活動(会議・委員会等。教科なし)の entry を並べる。会議も「授業」の一種。
    const hasActivity = cellNow.entries.some(e => isActivity(e));
    const body = cellNow.entries.map((e, i) => entryEditorHTML(state, e, i, period, ordinals)).join('');
    const inner = commonPalette + body
      + (s.mode !== 'fukushiki' && !hasActivity ? `<button class="btn small" data-add-entry>＋ 授業を追加</button>` : '');
    modal.querySelector('.cell-editor-body').innerHTML = inner;
    // フッター左の「削除」(授業ごと消す→空き・赤)はフッター静的HTMLで固定。
    // 右上「⋯」=このコマの操作。コマの種類で項目を出し分け(授業/活動の切替・クリアは授業のみ)。
    const ocMenu = modal.querySelector('.oc-menu');
    if (ocMenu) {
      ocMenu.style.display = cellNow.entries.length ? '' : 'none';
      const lockItem = ocMenu.querySelector('[data-oc-lock]');
      if (lockItem) lockItem.innerHTML = `${icon('lock')}${cellNow.entries.some(e => e.locked) ? 'ロック解除' : 'ロック'}`;
      const ocToggle = (sel, show) => { const el = ocMenu.querySelector(sel); if (el) el.style.display = show ? '' : 'none'; };
      ocToggle('[data-oc-make-activity]', s.mode !== 'fukushiki' && !hasActivity); // 授業→予定・活動
      ocToggle('[data-oc-make-lesson]', hasActivity);                              // 活動→授業
      ocToggle('[data-oc-clear]', !hasActivity);                                   // 活動には本時が無いのでクリア非表示
    }
    wireEditor(modal);
    associateLabels(modal); // 内部再描画でラベル関連付けが消えないように
  };

  const wireEditor = (modal) => {
    const cellNow = store.getCell(weekStart, dayIdx, periodId);
    const state = store.state;

    // 複式の共通パレット
    modal.querySelectorAll('[data-common-palette] button').forEach(b => {
      b.onclick = () => {
        for (const e of cellNow.entries) {
          e.subjectKey = b.dataset.subj;
          if (e.auto) e.text = '';
        }
        store.commit(); render(modal); ctx.rerender();
      };
    });

    modal.querySelectorAll('[data-entry]').forEach(box => {
      const idx = Number(box.dataset.entry);
      const entry = cellNow.entries[idx];
      // 何らかのユーザー操作があったエントリは事前充填扱いを解除する(閉じても残す)
      const touch = () => prefilled.delete(entry.id);

      box.querySelectorAll('.subject-palette button').forEach(b => {
        b.onclick = () => {
          touch();
          entry.subjectKey = b.dataset.subj === entry.subjectKey ? '' : b.dataset.subj;
          if (entry.auto) entry.text = '';
          // 教科を変えたら別単元/計画外/上書き/単元切上げ/手入力単元はリセット(別教科に持ち越さない)
          entry.pin = null; entry.offplan = false; entry.override = null; entry.endUnit = false;
          entry.unitName = ''; entry.nth = 0; entry.unitHours = 0;
          store.commit();
          render(modal);
          ctx.rerender();
        };
      });

      // 専科: 学級はボタンで1タップ選択。選んだ学級を次のコマの既定にする(再起動後も)
      box.querySelectorAll('[data-scope-btn]').forEach(b => {
        b.onclick = () => {
          touch();
          entry.scope = b.dataset.scopeBtn || null;
          ctx.lastScope = entry.scope;
          try { localStorage.setItem('shuan-last-scope', entry.scope || ''); } catch {}
          store.commit(); render(modal); ctx.rerender();
        };
      });

      // 複式: 直接/間接/ガイドの3択チップ(同じものを押すと解除)。
      // 片学年に「直」を付けたら、未設定の相方には「間」を自動補完(その逆も)
      box.querySelectorAll('[data-guide]').forEach(b => {
        b.onclick = () => {
          entry.guide = entry.guide === b.dataset.guide ? null : b.dataset.guide;
          if (cellNow.entries.length === 2 && (entry.guide === 'direct' || entry.guide === 'indirect')) {
            const other = cellNow.entries.find(x => x !== entry);
            if (other && !other.guide) other.guide = entry.guide === 'direct' ? 'indirect' : 'direct';
          }
          store.commit(); render(modal); ctx.rerender();
        };
      });

      const textArea = box.querySelector('[name="text"]');
      if (textArea) {
        textArea.addEventListener('input', () => {
          touch();
          entry.text = textArea.value;
          entry.auto = textArea.value.trim() === '';
          store.commit();
        });
        textArea.addEventListener('change', () => ctx.rerender());
      }

      const noteInput = box.querySelector('[name="note"]');
      noteInput.addEventListener('input', () => { touch(); entry.note = noteInput.value; store.commit(); });
      noteInput.addEventListener('change', () => ctx.rerender());

      // 項目別オーバーライド: ねらい/学習活動/評価規準を「このコマだけ」上書き
      box.querySelectorAll('.ov-input').forEach(ta => {
        const grow = () => { ta.style.height = 'auto'; ta.style.height = Math.max(ta.scrollHeight, 36) + 'px'; };
        grow();
        ta.addEventListener('input', () => { grow(); touch(); setOverride(entry, ta.dataset.ov, ta.value, ta.dataset.plan); store.commit(); });
        ta.addEventListener('change', () => { render(modal); ctx.rerender(); });
      });
      box.querySelectorAll('[data-ov-reset]').forEach(b => {
        b.onclick = () => { touch(); clearOverrideKey(entry, b.dataset.ovReset); store.commit(); render(modal); ctx.rerender(); };
      });
      box.querySelectorAll('[data-ov-vp] [data-vp]').forEach(b => {
        b.onclick = () => {
          touch();
          const planVp = b.closest('[data-ov-vp]')?.dataset.planVp || '';
          setOverrideViewpoint(entry, b.dataset.vp, planVp);
          store.commit(); render(modal); ctx.rerender();
        };
      });

      // この時間だけ別の単元の本時をやる(pin)
      const pinUnitSel = box.querySelector('[name="pinUnit"]');
      if (pinUnitSel) pinUnitSel.onchange = () => {
        touch();
        entry.pin = pinUnitSel.value ? { unitId: pinUnitSel.value, nth: 1 } : null;
        store.commit(); render(modal); ctx.rerender();
      };
      const pinLessonSel = box.querySelector('[name="pinLesson"]');
      if (pinLessonSel) pinLessonSel.onchange = () => {
        touch();
        if (entry.pin) { entry.pin = { ...entry.pin, nth: Number(pinLessonSel.value) || 1 }; store.commit(); render(modal); ctx.rerender(); }
      };

      const resetBtn = box.querySelector('[data-reset-auto]');
      if (resetBtn) resetBtn.onclick = () => {
        entry.text = ''; entry.auto = true;
        store.commit(); render(modal); ctx.rerender();
      };

      // 計画が無いコマの単元・時数の手入力
      const unitInp = box.querySelector('[name="unitName"]');
      if (unitInp) { unitInp.addEventListener('input', () => { touch(); entry.unitName = unitInp.value; store.commit(); }); unitInp.addEventListener('change', () => ctx.rerender()); }
      const nthInp = box.querySelector('[name="nth"]');
      if (nthInp) nthInp.addEventListener('change', () => { touch(); entry.nth = Math.max(0, Number(nthInp.value) || 0); store.commit(); ctx.rerender(); });
      const uhInp = box.querySelector('[name="unitHours"]');
      if (uhInp) uhInp.addEventListener('change', () => { touch(); entry.unitHours = Math.max(0, Number(uhInp.value) || 0); store.commit(); ctx.rerender(); });

      // 「この時間にやること」3択(計画どおり/別の単元/計画外)。advance+pin+計画外 を統合。
      box.querySelectorAll('[data-lm]').forEach(b => {
        b.onclick = () => {
          touch();
          const m = b.dataset.lm;
          if (m === 'plan') { entry.pin = null; entry.offplan = false; entry.advance = null; }
          else if (m === 'pin') {
            entry.offplan = false;
            if (!entry.pin) {
              const grade = scopeGrade(store.settings, entry.scope);
              const plan = store.state.plans.find(p => p.subjectKey === entry.subjectKey && (p.grade == null || p.grade === grade));
              const u = plan?.units?.[0];
              entry.pin = u ? { unitId: String(u.id), nth: 1 } : null;
            }
          } else if (m === 'offplan') { entry.offplan = true; entry.pin = null; entry.advance = null; }
          store.commit(); render(modal); ctx.rerender();
        };
      });

      const ncChk = box.querySelector('[name="noCount"]');
      ncChk.onchange = () => { touch(); entry.noCount = ncChk.checked; store.commit(); ctx.rerender(); };

      // この時間で単元を終える(残りの計画コマを飛ばして次の単元へ)
      const euChk = box.querySelector('[name="endUnit"]');
      if (euChk) euChk.onchange = () => { touch(); entry.endUnit = euChk.checked; store.commit(); ctx.rerender(); };

      const cancelChk = box.querySelector('[name="cancelled"]');
      cancelChk.onchange = () => {
        touch();
        if (cancelChk.checked) {
          // 中止前の予定内容を控えておく(印刷・画面に「何が中止か」を残す)
          const ords = computeOrdinals(state, weekStart);
          entry.cancelledText = resolveEntryText(state, entry, ords).text;
          entry.cancelled = true;
        } else {
          entry.cancelled = false;
          entry.cancelledText = '';
        }
        store.commit(); render(modal); ctx.rerender();
      };

      const fracSel = box.querySelector('[name="fraction"]');
      fracSel.onchange = () => { touch(); entry.fraction = Number(fracSel.value); store.commit(); ctx.rerender(); };

      const delBtn = box.querySelector('[data-del-entry]');
      if (delBtn) delBtn.onclick = () => {
        cellNow.entries.splice(idx, 1);
        store.commit(); render(modal); ctx.rerender();
      };
    });

    const addBtn = modal.querySelector('[data-add-entry]');
    if (addBtn) addBtn.onclick = () => {
      const e = newEntry();
      if (s.mode === 'senka') {
        e.scope = validScope(s, ctx.lastScope) ?? s.senkaClasses[0]?.id ?? null;
        e.subjectKey = s.subjects.some(x => x.key === s.senkaSubject) ? s.senkaSubject : ''; // 実在チェック(ensureと同じ)
        if (e.subjectKey) prefilled.add(e.id); // 追加後に何も触らず閉じたら掃除する
      }
      cellNow.entries.push(e);
      store.commit(); render(modal); ctx.rerender();
    };

    // 授業⇄活動の切替は右上「⋯」(data-oc-make-activity/lesson)へ集約済み。
    // 活動(会議・委員会等)の名前 ＋ よく使うプリセット ＋ 備考
    const actName = modal.querySelector('[name="activityName"]');
    if (actName) {
      const e0 = () => store.getCell(weekStart, dayIdx, periodId)?.entries?.[0];
      actName.addEventListener('input', () => { const e = e0(); if (e) { e.unitName = actName.value; store.commit(); } });
      actName.addEventListener('change', () => ctx.rerender());
      modal.querySelectorAll('.memo-preset').forEach(b => b.onclick = () => {
        const e = e0(); if (!e) return; e.unitName = b.dataset.preset; actName.value = b.dataset.preset; store.commit(); ctx.rerender();
      });
      const actNote = modal.querySelector('[name="actNote"]');
      if (actNote) { actNote.addEventListener('input', () => { const e = e0(); if (e) { e.note = actNote.value; store.commit(); } }); actNote.addEventListener('change', () => ctx.rerender()); }
    }
  };

  openModal(`
    <div class="oc-titlebar">
      <h2>${esc(title)}</h2>
      <details class="menu oc-menu">
        <summary class="btn small ghost" aria-label="このコマの操作">⋯</summary>
        <div class="menu-items">
          <button class="btn ghost menu-item" data-oc-lock title="「計画に合わせて更新」しても上書きされません">${icon('lock')}ロック</button>
          <button class="btn ghost menu-item" data-oc-make-activity title="この時間を会議・委員会・クラブなどの予定にする（時数に数えません）">${icon('memo')}予定・活動にする</button>
          <button class="btn ghost menu-item" data-oc-make-lesson title="予定をやめて授業に戻す">${icon('book')}授業に変える</button>
          <button class="btn ghost menu-item" data-oc-clear title="本時のねらい・活動・評価を空に。教科・学級は残ります">${icon('eraser')}クリア</button>
          <button class="btn ghost menu-item" data-oc-move>${icon('refresh')}別の時間へ移動</button>
        </div>
      </details>
    </div>
    <div class="cell-editor-body"></div>
    <div class="modal-foot">
      <button class="btn danger left" data-clear-cell>${icon('trash')}削除</button>
      <button class="btn ghost" data-revert>取り消す</button>
      <button class="btn primary" data-close>閉じる</button>
    </div>
  `, (modal, close) => {
    closeModal = close;
    render(modal);
    modal.querySelector('[data-close]').onclick = () => close();
    // 右上「⋯」: このコマへの操作(ロック/クリア/移動)。Apple流に二次操作を畳む。
    const ocMenu = modal.querySelector('.oc-menu');
    const closeOcMenu = () => { if (ocMenu) ocMenu.open = false; };
    modal.querySelector('[data-oc-lock]').onclick = () => {
      closeOcMenu();
      const c = store.getCell(weekStart, dayIdx, periodId);
      if (!c?.entries?.length) return;
      const on = !c.entries.some(e => e.locked);
      store.snapshot(on ? 'コマをロック' : 'ロック解除');
      c.entries.forEach(e => { e.locked = on; });
      store.commit(); render(modal); ctx.rerender();
    };
    modal.querySelector('[data-oc-clear]').onclick = () => {
      closeOcMenu();
      const c = store.getCell(weekStart, dayIdx, periodId);
      if (!c?.entries?.length) return;
      store.snapshot('本時の中身をクリア');
      clearCellContent(c); // 教科・学級は残し、本時の中身(ねらい/活動/評価/全文)を空に
      store.commit(); render(modal); ctx.rerender();
      toast('本時の中身を空にしました', 'info', 2400, { label: '元に戻す', onClick: () => { store.undo(); render(modal); ctx.rerender(); } });
    };
    modal.querySelector('[data-oc-make-activity]').onclick = async () => {
      closeOcMenu();
      // 専科で1コマに複数学級があると活動化で2件目以降が畳まれる→明示確認＋スナップショットで安全に
      const folded = (store.getCell(weekStart, dayIdx, periodId)?.entries?.length || 0) - 1;
      if (folded >= 1 && !await confirmDialog(`他の学級（${folded}件）の授業も消えます。予定・活動にしますか?`, { okLabel: '予定・活動にする', danger: true })) return;
      store.snapshot('予定・活動にする');
      makeActivity(); store.commit(); render(modal); ctx.rerender();
      if (folded >= 1) toast('他の学級のコマを畳んで予定にしました', 'info', 2800, { label: '元に戻す', onClick: () => { store.undo(); render(modal); ctx.rerender(); } });
    };
    modal.querySelector('[data-oc-make-lesson]').onclick = () => {
      closeOcMenu();
      makeLesson(); store.commit(); render(modal); ctx.rerender();
    };
    modal.querySelector('[data-oc-move]').onclick = () => {
      closeOcMenu();
      ctx.swapSource = { weekStart, day: dayIdx, period: periodId };
      close();
    };
    // 取り消す: 開いた時点のセル状態へ戻して閉じる(編集を破棄)
    modal.querySelector('[data-revert]').onclick = () => {
      discarded = true;
      const w = store.getWeek(weekStart, true);
      const before = JSON.parse(openCellJSON);
      if (before) w.cells[editKey] = before; else delete w.cells[editKey];
      store.commit();
      close(); // cleanup は discarded を見て何もしない
      toast('変更を取り消しました', 'info', 2000);
      ctx.rerender();
    };
    // 削除=このコマを消す→空きに戻す(また流し込みで埋まりうる)。
    modal.querySelector('[data-clear-cell]').onclick = () => {
      const w = store.getWeek(weekStart, true);
      store.snapshot('コマを削除');
      delete w.cells[editKey];
      discarded = true; // 削除後の cleanup で再生成しない
      store.commit(); close();
      toast('削除しました', 'info', 2400, { label: '元に戻す', onClick: () => { store.undo(); ctx.rerender(); } });
    };
  }, cleanup);

  // 空のままのエントリは閉じるときに掃除する(冪等)。
  // 専科の事前充填エントリ(担当教科入り)も、ユーザー操作がなければ除去する
  // (空セルを開いて閉じるだけで授業が時数・進度に計上されないように)
  function cleanup() {
    if (discarded) return; // 「取り消す」で既に開いた時点へ復元済み。掃除はしない。
    const w = store.state.weeks[weekStart];
    const key = cellKey(dayIdx, periodId);
    const c = w?.cells?.[key];
    if (c) {
      // 備考・上書きは授業or活動を伴うときだけ意味を持つ(教科なし非活動の note/override だけのコマは幽霊なので掃除)
      c.entries = c.entries.filter(e => {
        const lesson = e.subjectKey && !prefilled.has(e.id);
        return lesson || isActivity(e) || (e.text && !e.auto) || ((e.note || e.override) && (e.subjectKey || isActivity(e)));
      });
      if (!c.entries.length) delete w.cells[key]; // 授業も活動も無ければ空き(コマ削除)
    }
    if (w && !Object.keys(w.cells).length && !w.goals && !w.reflection
      && !(w.events || []).some(Boolean)
      && !Object.keys(w.dayPatterns || {}).length
      && !(w.dayNotes || []).some(Boolean)
      && !(w.attendance || []).some(Boolean)) {
      delete store.state.weeks[weekStart];
    }
    store.commit();
    ctx.rerender();
    // 再描画でDOMが入れ替わるため、編集していたセルへフォーカスを戻す(キーボード操作の連続性)
    document.querySelector(`td.cell[data-day="${dayIdx}"][data-period="${CSS.escape(periodId)}"]`)?.focus();
  }
}

// ねらい/学習活動/評価規準 の「このコマだけ上書き」を entry.override に反映する。
// 計画と同じ値に戻したら上書き解除(計画どおりへ)。空にした場合は「白紙」として保持し、
// 計画文へ自動では戻さない(意図しない復活を防ぐ)。完全に解除したいときは ↺ で行う。
function setOverride(entry, key, value, planVal = '') {
  const o = { ...(entry.override || {}) };
  const v = String(value);
  if (v.trim() === String(planVal).trim()) delete o[key]; // 計画と同じ=上書きなし
  else o[key] = v;                                         // 空文字('')も白紙として保持
  entry.override = Object.keys(o).length ? o : null;
}

// 上書きを完全に解除して計画どおりへ戻す(↺ ボタン用)。
function clearOverrideKey(entry, key) {
  if (!entry.override) return;
  const o = { ...entry.override };
  delete o[key];
  entry.override = Object.keys(o).length ? o : null;
}

// このコマの「本時の中身」を空にする(教科・学級・モードは残す)。複数授業ぶん一括。
function clearCellContent(cell) {
  for (const e of cell.entries || []) {
    const o = { ...(e.override || {}) };
    o.objective = ''; o.activity = ''; o.assessment = '';
    e.override = o;
    e.text = ''; e.auto = true; // 全文手入力も消す
  }
}

// 観点(知/思/態)の上書き。同じ観点 or 計画と同じ観点を選んだら解除(計画に戻す)。
function setOverrideViewpoint(entry, code, planViewpoint) {
  const o = { ...(entry.override || {}) };
  const cur = ('viewpoint' in o) ? o.viewpoint : (planViewpoint || '');
  const next = (cur === code) ? '' : code;
  if (!next || next === (planViewpoint || '')) delete o.viewpoint;
  else o.viewpoint = next;
  entry.override = Object.keys(o).length ? o : null;
}

// 年間計画が無いコマの入力欄に出す「書き方の型」。白紙に放り出される初任者を助ける、
// 著作物ではない一般的な雛形(教科書の本文ではない)。
const OV_PLACEHOLDERS = {
  objective: '（例）〜について、〜が分かる／〜できる。',
  activity: '（例）〜を観察・実験し、気づいたことを交流する。',
  assessment: '（例）〜を理解している／〜を考えている。（観点は下で選ぶ）',
};

function entryEditorHTML(state, entry, idx, period, ordinals) {
  const s = state.settings;
  // 活動(会議・委員会・クラブ等。教科なし・時数に数えない)は名前だけのシンプル編集。
  if (isActivity(entry)) {
    return `<div class="entry-editor activity-editor">
      <div class="field">
        <label>予定・活動（会議・委員会・クラブなど）${infoHTML('授業ではない予定。時数に数えず、流し込みでも埋め直されません')}</label>
        <div class="memo-presets">${MEMO_PRESETS.map(x => `<button type="button" class="btn small ghost memo-preset" data-preset="${esc(x)}">${esc(x)}</button>`).join('')}</div>
        <input type="text" class="act-name" name="activityName" value="${esc(entry.unitName || '')}" placeholder="会議・委員会・クラブ・面談 など" aria-label="予定・活動の名前">
      </div>
      <div class="field"><label>備考</label><input type="text" name="actNote" value="${esc(entry.note || '')}"></div>
    </div>`;
  }
  const { resolved, details } = resolveEntryPlanDetails(state, entry, ordinals);
  // この時間だけ別の単元の本時をやる(pin)用: 教科・学年に対応する計画と、pin中の単元
  const planForPick = entry.subjectKey
    ? state.plans.find(p => p.subjectKey === entry.subjectKey && (p.grade == null || p.grade === scopeGrade(s, entry.scope)))
    : null;
  const pinUnit = entry.pin && planForPick ? (planForPick.units || []).find(u => String(u.id) === String(entry.pin.unitId)) : null;

  const palette = s.subjects.map(x =>
    `<button data-subj="${esc(x.key)}" class="${x.key === entry.subjectKey ? 'selected' : ''}"
       aria-pressed="${x.key === entry.subjectKey}"
       style="background:${esc(x.color)}">${esc(x.short || x.name)}</button>`).join('');

  // 専科: 学級ボタン列(1タップ選択)
  let scopeField = '';
  if (s.mode === 'senka' && s.senkaClasses.length) {
    scopeField = `<div class="field"><label>学級</label>
      <div class="scope-palette">${s.senkaClasses.map(c =>
        `<button data-scope-btn="${esc(c.id)}" class="${entry.scope === c.id ? 'selected' : ''}"
          aria-pressed="${entry.scope === c.id}">${esc(c.label || '学級未設定')}</button>`).join('')}
      </div></div>`;
  }

  const isKnownGrade = typeof entry.scope === 'number' && s.fukushikiGrades.includes(entry.scope);
  let gradeHead = '';
  if (s.mode === 'fukushiki') {
    const guideChips = ['direct', 'indirect', 'guide'].map(g =>
      `<button data-guide="${g}" class="guide-btn g-${g} ${entry.guide === g ? 'selected' : ''}"
        aria-pressed="${entry.guide === g}">${guideLabel(g)}</button>`).join('');
    gradeHead = `<div class="grade-head">
      <span>${isKnownGrade ? `${entry.scope}年` : '学年未設定'}</span>
      <span class="guide-chips">${guideChips}${infoHTML('直=直接指導 間=間接指導(自力学習) ガ=ガイド学習。印刷に◎○△で出ます')}</span>
    </div>`;
  }

  const criteriaRows = details ? [
    ['知識・技能', details.unitCriteria.knowledge],
    ['思考・判断・表現', details.unitCriteria.thinking],
    ['主体的態度', details.unitCriteria.attitude],
  ].filter(([, value]) => value).map(([label, value]) =>
    `<div class="auto-plan-row"><dt>${label}</dt><dd>${esc(value)}</dd></div>`).join('') : '';
  // 構造化編集の対象。計画があれば details、無くても教科が決まっていれば空の枠を出して記録できるようにする。
  const ed = details || (entry.subjectKey ? {
    planless: true, unitName: '', unitHours: 0, nth: 0, unitGoal: '',
    objective: '', activity: '', assessment: '', viewpoint: '',
    planObjective: '', planActivity: '', planAssessment: '', planViewpoint: '',
    overridden: { objective: false, activity: false, assessment: false, viewpoint: false },
  } : null);

  // 1項目分の編集フィールド。計画どおりなら欄に計画文が濃く出て、直接書き換えられる。
  // 空にすると白紙のまま定着(計画文へ自動では戻さない)。「↺ 計画に戻す」で元の計画文へ。
  const ovField = (key, label, planVal, effVal, isOv, extra = '') => `
    <div class="ov-field${isOv ? ' is-ov' : ''}">
      <div class="ov-flabel"><b>${label}</b>
        ${isOv
          ? `<span class="ov-badge">変更</span><button type="button" class="ov-reset" data-ov-reset="${key}">↺ 計画に戻す</button>`
          : (planVal ? '<span class="ov-asplan">計画どおり</span>' : '')}
      </div>
      <textarea class="ov-input" data-ov="${key}" data-plan="${esc(planVal || '')}" rows="2"
        placeholder="${esc(OV_PLACEHOLDERS[key] || '（自由に記録できます）')}">${esc(effVal)}</textarea>
      ${extra}
    </div>`;

  let autoBlock = '';
  if (ed) {
    const vp = ed.viewpoint || '';
    const vpSeg = `<div class="ov-vp" data-ov-vp data-plan-vp="${esc(ed.planViewpoint || '')}" role="group" aria-label="観点">
      ${['知', '思', '態'].map(code =>
        `<button type="button" data-vp="${code}" class="${vp === code ? 'selected' : ''}" aria-pressed="${vp === code}" title="${esc(VIEWPOINTS[code])}">${code}</button>`).join('')}
      <button type="button" data-vp="" class="ov-vp-none ${vp === '' ? 'selected' : ''}" aria-pressed="${vp === ''}">なし</button>
    </div>`;
    // 本時の内容(ねらい・学習活動・評価規準・観点)。計画どおりなら欄に計画文が濃く出て、
    // そのまま直接書き換えられる(開く=編集なので別の「編集」ボタンは置かない)。計画と同じに戻すと記録は消える。
    const vprow = `<div class="ov-vprow"><span class="ov-vplabel">観点${infoHTML('評価規準は「何を見取るか」の文。観点はその3区分のどれか:　知=知識・技能　思=思考・判断・表現　態=主体的に学習に取り組む態度')}${ed.overridden.viewpoint ? '<span class="ov-badge">変更</span>' : ''}</span>${vpSeg}</div>`;
    // 「この時間だけ別の単元の本時をやる」ピッカー(自転車操業対応)。計画に単元があるときだけ出す。
    const pinUnits = planForPick?.units || [];
    const lessonMode = entry.offplan ? 'offplan' : entry.pin ? 'pin' : 'plan';
    // 「別の単元」用の単元×本時セレクト(pinモードのときだけ表示)
    const pinSelects = (() => {
      if (!pinUnits.length) return '';
      const unitOpts = `<option value="">単元を選ぶ…</option>`
        + pinUnits.map(u => `<option value="${esc(u.id)}" ${entry.pin && String(entry.pin.unitId) === String(u.id) ? 'selected' : ''}>${esc(u.name)}</option>`).join('');
      let lessonSel = '';
      if (pinUnit) {
        const h = Math.max(1, Math.round(pinUnit.hours || pinUnit.lessons?.length || 1));
        const opts = Array.from({ length: h }, (_, i) => {
          const o = pinUnit.lessons?.[i]?.objective || pinUnit.lessons?.[i]?.text || '';
          return `<option value="${i + 1}" ${(entry.pin.nth || 1) === i + 1 ? 'selected' : ''}>${i + 1}時${o ? '：' + esc(String(o).slice(0, 16)) : ''}</option>`;
        }).join('');
        lessonSel = `<label class="up-label">本時</label><select name="pinLesson">${opts}</select>`;
      }
      return `<div class="up-body"><label class="up-label">単元</label><select name="pinUnit">${unitOpts}</select>${lessonSel}</div>`;
    })();
    // 「この時間にやること」3択(計画どおり/別の単元/計画外)。advance+pin+計画外 を統合し「詳細」から昇格。
    const lmBtn = (val, label) => `<button type="button" class="lm-btn ${lessonMode === val ? 'selected' : ''}" data-lm="${val}" aria-pressed="${lessonMode === val}">${label}</button>`;
    const lessonModeSelector = planForPick ? `
      <div class="field"><label>この時間にやること${infoHTML('計画どおり＝年間計画の順番。本時を選ぶ＝この時間だけ指定の本時をやる(他コマの順番は不変。同じ本時の再実施も可)。計画外＝復習・テスト・予備など計画に紐づかない授業で、進度は進みません')}</label>
        <div class="lesson-mode" role="group">${lmBtn('plan', '計画どおり')}${pinUnits.length ? lmBtn('pin', '本時を選ぶ') : ''}${lmBtn('offplan', '計画外')}</div>
        ${lessonMode === 'pin' ? pinSelects : ''}
      </div>` : '';
    // 単元途中で切り上げる(計画どおりモードかつ単元途中のときだけ、単元見出しの近くに出す)
    // モジュール校時は既定で進度を進めないため単元切上げが効かない→チェックを出さない(無言で無視されるのを防ぐ)
    const endUnitInline = (lessonMode === 'plan' && details && details.unitHours > 1 && details.nth < details.unitHours && period.type !== 'module')
      ? `<label class="eu-inline"><input type="checkbox" name="endUnit" ${entry.endUnit ? 'checked' : ''}>この時間で単元を切り上げる（残り${details.unitHours - details.nth}コマを飛ばす）</label>` : '';
    const modeHeader = lessonMode === 'offplan'
      ? `<div class="ov-head"><span class="ov-kicker">計画外</span><span class="ov-sub">復習・テスト・予備など（進度は進みません）</span></div>`
      : ed.planless
        ? `<div class="ov-head"><span class="ov-kicker">本時の記録</span><span class="ov-sub">年間計画に未登録のコマ（単元・時数も手入力できます）</span></div>
           <div class="planless-unit">
             <label class="pu-field"><span>単元</span><input type="text" name="unitName" value="${esc(ed.unitName || '')}" placeholder="（例）ごんぎつね"></label>
             <label class="pu-field pu-num"><span>何時間目</span><input type="number" name="nth" min="0" inputmode="numeric" value="${ed.nth || ''}"></label>
             <label class="pu-field pu-num"><span>／総時数</span><input type="number" name="unitHours" min="0" inputmode="numeric" value="${ed.unitHours || ''}"></label>
           </div>`
        : `<div class="ov-head"><span class="ov-kicker">${entry.auto ? '年間指導計画' : '年間指導計画（参照）'}</span><strong>${esc(ed.unitName)}</strong>${ed.unitHours > 1 ? `<span class="ov-nth">${ed.nth}/${ed.unitHours}時</span>` : ''}${endUnitInline}<span class="ov-help">${infoHTML('計画どおりなら触らなくてOK。実際の授業に合わせて直した項目だけが「変更」として記録されます')}</span></div>`;
    autoBlock = `<div class="ov-block">
      ${lessonModeSelector}
      ${modeHeader}
      ${ovField('objective', '本時のねらい', ed.planObjective, ed.objective, ed.overridden.objective)}
      ${ovField('activity', '学習活動', ed.planActivity, ed.activity, ed.overridden.activity)}
      ${ovField('assessment', '評価規準', ed.planAssessment, ed.assessment, ed.overridden.assessment, vprow)}
      ${(details && (details.unitGoal || criteriaRows)) ? `<details class="auto-unit-details"><summary>単元全体の目標・評価規準</summary>
        ${details.unitGoal ? `<div class="auto-plan-item"><b>単元の目標</b><span>${esc(details.unitGoal)}</span></div>` : ''}
        ${criteriaRows ? `<dl class="auto-criteria">${criteriaRows}</dl>` : ''}
      </details>` : ''}
    </div>`;
  } else if (entry.auto && resolved.text) {
    autoBlock = `<div class="auto-preview"><span class="label">自動反映</span>${esc(resolved.text)}</div>`;
  } else if (entry.auto && !state.plans.length && idx === 0) {
    autoBlock = '<div class="auto-preview muted">年間指導計画を登録すると、ここに単元・内容が自動で入ります</div>';
  }

  // 既定値から変わっている項目があるときだけ「詳細」を開いておく
  const advOpen = (entry.fraction ?? 1) !== 1 || entry.advance != null || entry.noCount || entry.cancelled || entry.endUnit;

  // 選択済みの教科・学級を先頭1行に出し、パレットは「変更」で開く(編集の常用導線を短く)
  const subj = subjectOf(s, entry.subjectKey);
  const scopeLabel = s.mode === 'senka' ? scopeLabelOf(s, entry.scope) : '';
  const scopeSet = s.mode !== 'senka' || (entry.scope != null && entry.scope !== '' && s.senkaClasses.some(c => c.id === entry.scope));

    card.querySelector('[data-hup]').onclick = () => { if (i > 0) { swap(unit.lessons, i, i - 1); save(); reRender(); } };
    card.querySelector('[data-hdown]').onclick = () => { if (i < unit.lessons.length - 1) { swap(unit.lessons, i, i + 1); save(); reRender(); } };

    unit.hours = unit.lessons.length;
    save(); reRender();
  };

function defaultGrade(s) {
  if (s.mode === 'fukushiki') return s.fukushikiGrades[0];
  return s.grade || 1;
}

function swap(arr, i, j) { [arr[i], arr[j]] = [arr[j], arr[i]]; }

function downloadText(text, filename) {

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

        <button class="btn small" id="stats-print">印刷</button>
      </div>
      ${sections ? `<div class="hours-legend" aria-hidden="true">
        <span><i class="hl-done"></i>実施</span>
        <span><i class="hl-plan"></i>予定</span>
        <span><i class="hl-std"></i>標準</span>
        <span class="hl-note">バーが標準ラインに届けば達成</span>
      </div>` : ''}
      ${classSummary}
      ${progress}
      ${viewpoints}
      ${sections || `<div class="empty-state">
        <div class="empty-ic">${icon('chart')}</div>
        <p class="empty-title">まだ集計するコマがありません</p>
        <p class="empty-sub">週案タブでコマを入れると、ここに実施時数と標準時数への進捗が表示されます。</p>
      </div>`}
    </div>
  `;

  root.querySelector('#stats-detail').onchange = (e) => {
    localStorage.setItem(DETAIL_KEY, e.target.checked ? '1' : '0');
    ctx.rerender();
  };

  // 標準時数の上書き編集(空欄=既定に戻す、数値以外は無視)
  root.querySelectorAll('input[data-std]').forEach(inp => {
    inp.addEventListener('change', () => {
      const [subjKey, grade] = inp.dataset.std.split('@');
      if (!s.standardOverrides) s.standardOverrides = {};
      const v = inp.value.trim();
      const n = Number(v);
      if (v === '' || !isFinite(n) || n < 0) delete s.standardOverrides[`${subjKey}|${grade}`];
      else s.standardOverrides[`${subjKey}|${grade}`] = n;
      store.commit();
      ctx.rerender();
    });
  });

  root.querySelector('#stats-csv').onclick = () => downloadCSV(state, weekStart);
  root.querySelector('#stats-print').onclick = async () => {
    const { buildStatsPrintDOM, printState } = await Promise.resolve(__M["print.js"]);
    buildStatsPrintDOM(weekStart);
    printState.prepared = true;
    requestAnimationFrame(() => requestAnimationFrame(() => window.print()));
  };
}

/** 表示するスコープの一覧。専科の「学級指定なし」は実データがあるときだけ */
function scopesOf(s, hours) {
  if (s.mode === 'fukushiki') {
    return s.fukushikiGrades.map(g => ({ scope: g, label: `${g}年`, grade: g }));
  }
  if (s.mode === 'senka') {
    const list = s.senkaClasses.map(c => ({ scope: c.id, label: c.label, grade: c.grade }));
    const hasNull = [...hours.keys()].some(k => k.endsWith('|'));
    if (hasNull) list.push({ scope: '', label: '(学級指定なし)', grade: s.grade });
    return list;
  }
  return [{ scope: '', label: '', grade: s.grade }];
}

// ---------------------------------------------------------------- 学級横断サマリー(専科・複式)

/**
 * 全学級(専科)・全学年(複式)の時数を1枚で見渡す一覧。
 * 専科で12学級を担当していても、提出時に「どの学級が標準に対してどこまで進んだか」を一望できる。
 * 各学級の主要教科(合算先を持たない教科)の実施済・予定計・標準を合算して出す。
 */
/**
 * 時数の状態を一目で示すバー。標準時数を目標ラインに、実施(実線)と予定(淡色)を重ねる。
 * バーが目標ラインに届かない=標準に未達。標準を多少上回るのは差し支えないため、
 * 過度な超過(標準の115%超)のときだけ淡色を警告色にする。色＋位置(ライン)＋数値で色覚に依存しない。
 */
function hoursBar(done, total, std) {
  if (!std) {
    const max = Math.max(total, done, 1);
    return `<div class="hbar" title="実施${fmtHours(done)} / 予定${fmtHours(total)}">
      <div class="hbar-plan" style="width:${Math.min(total / max, 1) * 100}%"></div>
      <div class="hbar-done" style="width:${Math.min(done / max, 1) * 100}%"></div>
    </div>`;
  }
  const max = Math.max(total, std);
  const stdPct = std / max * 100;
  const over = total > std * 1.15; // 標準を多少超える程度は警告しない(超過は原則差し支えない)
  return `<div class="hbar ${over ? 'is-over' : ''}" title="実施${fmtHours(done)} / 予定${fmtHours(total)} / 標準${fmtHours(std)}">
    <div class="hbar-plan" style="width:${total / max * 100}%"></div>
    <div class="hbar-done" style="width:${done / max * 100}%"></div>
    <div class="hbar-std" style="left:${stdPct}%"></div>
  </div>`;
}

function renderClassSummary(state, hours, hoursDone, scopes) {
  const s = state.settings;
  const keys = new Set(s.subjects.map(x => x.key));
  const childrenOf = {};
  for (const subj of s.subjects) {
    if (subj.parent && keys.has(subj.parent)) (childrenOf[subj.parent] = childrenOf[subj.parent] || []).push(subj.key);
  }

  let sumDone = 0, sumYear = 0, sumStd = 0;
  const rows = [];
  for (const sc of scopes) {
    const scopeVal = sc.scope === '' ? null : sc.scope;
    let done = 0, yearTotal = 0, std = 0;       // 予定計=年間の入力済み(実施済≦予定計を保証・過去週でも矛盾しない)
    for (const subj of s.subjects) {
      if (subj.parent && keys.has(subj.parent)) continue;
      let t = 0, d = 0;
      for (const k of [subj.key, ...(childrenOf[subj.key] || [])]) {
        const v = hours.get(scopeKey(k, scopeVal));
        if (v) t += (v.yearTotal || 0);
        d += hoursDone.get(scopeKey(k, scopeVal))?.done || 0;
      }
      if (t > 0 || d > 0) {
        yearTotal += t; done += d;
        const sd = standardHoursFor(s, subj.key, sc.grade);
        if (sd != null) std += sd;
      }
    }
    if (yearTotal === 0 && done === 0) continue; // 未入力の学級は出さない
    sumDone += done; sumYear += yearTotal; sumStd += std;
    const remain = std ? std - yearTotal : null;
    const totalStd = standardTotalHoursFor(s, sc.grade); // 施行規則 別表の年間総授業時数(法定の総枠)
    rows.push(`
      <tr>
        <td class="subj">${esc(sc.label || '—')}</td>
        <td>${fmtHours(done)}</td>
        <td>${fmtHours(yearTotal)}</td>
        <td>${std || '—'}</td>
        <td>${totalStd || '—'}</td>
        <td>${remain != null ? fmtHours(remain) : '—'}</td>
        <td style="text-align:left;">${hoursBar(done, yearTotal, std)}</td>
      </tr>`);
  }
  if (rows.length < 2) return ''; // 1学級分しか無ければ通常テーブルで十分

  const label = s.mode === 'fukushiki' ? '学年' : '学級';
  return `
    <h3 style="margin-top:0;">全${label}の進捗${infoHTML('担当する全' + label + 'の実施済・予定計・標準時数を一覧します。提出時の確認用。バーは実施済÷標準')}</h3>
    <div class="table-scroll">
      <table class="stats-table" style="margin-bottom:18px;">
        <thead><tr>
          <th style="width:110px;">${label}</th>
          <th style="width:70px;">実施済</th>
          <th style="width:70px;">予定計</th>
          <th style="width:60px;">教科計${infoHTML('開設する各教科の標準時数の合計。下の「総授業時数」(法定の総枠)とは別物です')}</th>
          <th style="width:78px;">総授業時数${infoHTML('学校教育法施行規則 別表の年間総授業時数(法定の総枠)。予定計がこれに達するかで確保状況を見ます')}</th>
          <th style="width:60px;">残り</th>
          <th>進捗(実施)</th>
        </tr></thead>
        <tbody>
          ${rows.join('')}
          <tr style="background:#f8fafc;">
            <td class="subj">合計</td><td><b>${fmtHours(sumDone)}</b></td><td>${fmtHours(sumYear)}</td>
            <td>${sumStd || '—'}</td><td></td><td>${sumStd ? fmtHours(sumStd - sumYear) : '—'}</td><td></td>
          </tr>
        </tbody>
      </table>
    </div>`;
}

// ---------------------------------------------------------------- 観点別の評価場面

/**
 * 観点別評価(知/思/態)のタグを付けたコマを、実施済の範囲で学級×教科ごとに数える。
 * 観点を入力させておきながら集計しない問題への対応。評定期の偏り(例: 思考の評価場面が少ない)を可視化する。
 */
function renderViewpointSummary(state, scopes, weekStart) {
  const s = state.settings;
  const tally = computeViewpointTally(state, doneRefWeek(weekStart)); // 今日までに実施したコマで数える
  if (!tally.size) return '';
  const keys = new Set(s.subjects.map(x => x.key));
  const childrenOf = {};
  for (const subj of s.subjects) {
    if (subj.parent && keys.has(subj.parent)) (childrenOf[subj.parent] = childrenOf[subj.parent] || []).push(subj.key);
  }
  const rows = [];
  for (const sc of scopes) {
    const scopeVal = sc.scope === '' ? null : sc.scope;
    for (const subj of s.subjects) {
      if (subj.parent && keys.has(subj.parent)) continue;
      let k = 0, t = 0, a = 0;
      for (const key of [subj.key, ...(childrenOf[subj.key] || [])]) {
        const v = tally.get(scopeKey(key, scopeVal));
        if (v) { k += v['知']; t += v['思']; a += v['態']; }
      }
      const sum = k + t + a;
      if (!sum) continue;
      rows.push(`<tr>
        <td class="subj">${esc(sc.label || '—')}</td>
        <td style="text-align:left;">${esc(subj.short || subj.name)}</td>
        <td>${k || ''}</td><td>${t || ''}</td><td>${a || ''}</td><td><b>${sum}</b></td>
      </tr>`);
    }
  }
  if (!rows.length) return '';
  const label = s.mode === 'fukushiki' ? '学年' : '学級';
  return `
    <h3>観点別の評価場面${infoHTML('観点(知/思/態)のタグを付けたコマを、実施済の範囲で学級×教科ごとに数えます。評定期に「思考の評価場面が少ない」等の偏りを事前に把握できます')}</h3>
    <div class="table-scroll">
      <table class="stats-table" style="margin-bottom:18px;">
        <thead><tr>
          <th style="width:110px;">${label}</th>
          <th style="text-align:left;">教科</th>
          <th style="width:54px;"><span class="vp-badge" data-vp="知">知</span></th>
          <th style="width:54px;"><span class="vp-badge" data-vp="思">思</span></th>
          <th style="width:54px;"><span class="vp-badge" data-vp="態">態</span></th>
          <th style="width:48px;">計</th>
        </tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    </div>`;
}

// ---------------------------------------------------------------- 進度一覧(専科・複式の核心ビュー)

/**
 * 学級(学年)×教科の進度マトリクス。
 * 「次の授業がどの単元の何時間目か」「前回いつやったか」を一覧する(実験準備・進度ズレ確認用)。
 */
function renderProgress(state, weekStart) {
  const s = state.settings;
  const prog = progressByScope(state, weekStart);
  if (!prog.size) return '';

  const scopes = s.mode === 'fukushiki'
    ? s.fukushikiGrades.map(g => ({ scope: g, label: `${g}年`, grade: g }))
    : s.mode === 'senka'
      ? s.senkaClasses.map(c => ({ scope: c.id, label: c.label || '学級未設定', grade: c.grade }))
      : [{ scope: null, label: `${s.grade}年${s.className || ''}`, grade: s.grade }];

  // 進度データのある教科を収集
  const subjKeys = new Set();
  for (const k of prog.keys()) subjKeys.add(k.split('|')[0]);

  const rows = [];
  for (const sc of scopes) {
    for (const subjKey of subjKeys) {
      const p = prog.get(scopeKey(subjKey, sc.scope));
      if (!p) continue;
      const subj = s.subjects.find(x => x.key === subjKey);
      const plan = state.plans.find(pl => pl.subjectKey === subjKey && (pl.grade == null || pl.grade === sc.grade));
      const next = plan ? lessonFromPlan(plan, p.count) : null;
      const nextText = next
        ? (next.exhausted ? '計画終了' : `${next.unitName}${next.unitHours > 1 ? `(${next.nth}/${next.unitHours})` : ''}${next.lessonText ? ' ' + next.lessonText : ''}`)
        : '—';
      rows.push(`
        <tr>
          <td class="subj">${esc(sc.label)}</td>
          ${subjKeys.size > 1 ? `<td>${esc(subj?.short || subjKey)}</td>` : ''}
          <td style="text-align:left;">${esc(nextText)}</td>
          <td>${p.lastDate ? fmtMD(parseDate(p.lastDate)) : '—'}</td>
          <td>${p.count}</td>
        </tr>`);
    }
  }
  if (!rows.length) return '';

  return `
    <h3 style="margin-top:0;">進度一覧${infoHTML('学級ごとに「次の授業がどの単元の何時間目か」を表示します。行事や閉鎖で進度がずれても自動で追跡されます')}</h3>
    <table class="stats-table" style="margin-bottom:18px;">
      <thead><tr>
        <th style="width:90px;">${store.settings.mode === 'fukushiki' ? '学年' : '学級'}</th>
        ${subjKeys.size > 1 ? '<th style="width:60px;">教科</th>' : ''}
        <th>次の授業</th><th style="width:70px;">前回</th><th style="width:70px;">済コマ</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>`;
}

/** 進度カウンタ(scopeKey→{count, lastDate})。computeOrdinalsと同じ規則で数える */
function progressByScope(state, refWeekStart) {
  const { settings, weeks } = state;
  const ordinals = computeOrdinals(state, refWeekStart); // 走査規則の正は store 側
  const out = new Map();
  for (const wk of Object.keys(weeks).sort()) {
    const week = weeks[wk];
    const monday = parseDate(wk);
    for (let d = 0; d < 7; d++) {
      for (const p of settings.periods) {
        const cell = week.cells?.[cellKey(d, p.id)];
        if (!cell) continue;
        for (const e of cell.entries) {
          if (!ordinals.has(e.id)) continue; // 進度を進めたエントリだけ
          const k = scopeKey(e.subjectKey, e.scope);
          const cur = out.get(k) || { count: 0, lastDate: null };
          cur.count = Math.max(cur.count, ordinals.get(e.id) + 1);
          const dateStr = fmtDate(addDays(monday, d));
          if (!cur.lastDate || dateStr > cur.lastDate) cur.lastDate = dateStr;
          out.set(k, cur);
        }
      }
    }
  }
  return out;
}

// ---------------------------------------------------------------- 教科別テーブル

function renderScopeTable(state, hours, hoursDone, monthly, sc, weekNo, weekStart, detail) {
  const s = state.settings;
  const scopeVal = sc.scope === '' ? null : sc.scope;
  const get = (subjKey) => hours.get(scopeKey(subjKey, scopeVal)) || { week: 0, total: 0, yearTotal: 0 };
  const getDone = (subjKey) => hoursDone.get(scopeKey(subjKey, scopeVal))?.done || 0;

  const keys = new Set(s.subjects.map(x => x.key));
  const childrenOf = {};
  for (const subj of s.subjects) {
    if (subj.parent && keys.has(subj.parent)) (childrenOf[subj.parent] = childrenOf[subj.parent] || []).push(subj.key);
  }

  const activeRows = [];
  const zeroRows = [];
  let any = false;
  // 長期休業を設定していれば残り・経過の「授業週数」でペースと見込みを計算
  const weeksLeft = teachingWeeksLeft(s, weekStart);
  const weeksElapsed = teachingWeeksElapsed(s, weekStart);
  for (const subj of s.subjects) {
    if (subj.parent && keys.has(subj.parent)) continue;
    const own = get(subj.key);
    let week = own.week, total = own.total, yearTotal = own.yearTotal || 0;
    const mergedFrom = [];
    for (const ck of childrenOf[subj.key] || []) {
      const c = get(ck);
      if ((c.yearTotal || 0) > 0 || c.week > 0) mergedFrom.push(s.subjects.find(x => x.key === ck)?.name || ck);
      week += c.week; total += c.total; yearTotal += c.yearTotal || 0;
    }
    let done = getDone(subj.key);
    for (const ck of childrenOf[subj.key] || []) done += getDone(ck);
    const std = standardHoursFor(s, subj.key, sc.grade);
    if (yearTotal === 0 && week === 0 && done === 0 && std == null) continue;
    any = true;
    // 残り・必要ペース・進捗率・見込みは「年間の着地」指標なので、表示週までの累計(total)でなく年間入力済み(yearTotal)を母数にする
    const remain = std != null ? std - yearTotal : null;
    const pace = remain != null && remain > 0 && weeksLeft > 0 ? remain / weeksLeft : null;
    // 分母は経過「授業」週数(暦週数で割ると夏休み以降の着地を恒常的に過小評価する)
    const projected = yearTotal > 0 ? (yearTotal / weeksElapsed) * (s.hoursBase || 35) : null;
    const pct = std ? Math.min(100, Math.round((yearTotal / std) * 100)) : 0;
    const over = std != null && yearTotal > std;
    const row = `
      <tr class="${over ? 'over' : ''}">
        <td class="subj"><span class="subj-chip" style="background:${esc(subj.color)}">${esc(subj.short || subj.name)}</span>
          ${esc(subj.name)}${mergedFrom.length ? `<span class="hint">(+${mergedFrom.map(esc).join('・')})</span>` : ''}</td>
        <td>${fmtHours(week)}</td>
        <td>${fmtHours(done)}</td>
        ${detail ? `<td><b>${fmtHours(yearTotal)}</b></td>` : ''}
        <td><input data-std="${esc(subj.key)}@${sc.grade}" value="${std ?? ''}" placeholder="—"
              aria-label="${esc(subj.name)}の標準時数"
              style="width:56px; border:none; background:transparent; text-align:right; font-family:inherit;"></td>
        <td>${remain != null ? fmtHours(remain) : '—'}</td>
        ${detail ? `<td>${pace != null ? fmtHours(pace) + ' /週' : '—'}</td>
        <td>${projected != null ? Math.round(projected) : '—'}</td>` : ''}
        <td style="text-align:left;">${hoursBar(done, yearTotal, std)}</td>
      </tr>`;
    // 専科・複式では「時数0で標準だけある行」を畳む(自分の教科1行を探させない)
    if (s.mode !== 'homeroom' && yearTotal === 0 && week === 0 && done === 0) zeroRows.push(row);
    else activeRows.push(row);
  }
  if (!any) return '';
  if (!activeRows.length && s.mode !== 'homeroom') return ''; // この学級は未入力

  let sumWeek = 0, sumYear = 0, sumDone = 0;
  for (const subj of s.subjects) {
    const v = get(subj.key);
    sumWeek += v.week; sumYear += (v.yearTotal || 0); sumDone += getDone(subj.key);
  }

  // 月別・学期別テーブル
  const subjForMonthly = s.subjects.filter(x => !(x.parent && keys.has(x.parent)));
  const getMonthly = (map, subjKey) => {
    if (!map) return 0;
    let v = map.get(scopeKey(subjKey, scopeVal)) || 0;
    for (const ck of childrenOf[subjKey] || []) v += map.get(scopeKey(ck, scopeVal)) || 0;
    return v;
  };
  const monthlyRows = subjForMonthly.map(subj => {
    const cells = MONTH_ORDER.map(m => {
      const v = getMonthly(monthly.months.get(m), subj.key);
      return `<td>${v ? fmtHours(v) : ''}</td>`;
    });
    const termCells = monthly.terms.map(t => {
      const v = getMonthly(t.hours, subj.key);
      return `<td style="background:#f8fafc;"><b>${v ? fmtHours(v) : ''}</b></td>`;
    });
    const yearTotal = monthly.terms.reduce((a, t) => a + getMonthly(t.hours, subj.key), 0);
    if (!yearTotal) return '';
    return `<tr>
      <td class="subj"><span class="subj-chip" style="background:${esc(subj.color)}">${esc(subj.short || subj.name)}</span></td>
      ${cells.join('')}${termCells.join('')}
      <td style="background:#eef2f7;"><b>${fmtHours(yearTotal)}</b></td>
    </tr>`;
  }).filter(Boolean).join('');

  const monthlyTable = monthlyRows ? `
    <details style="margin-bottom:18px;">
      <summary class="fold-label">月別・学期別</summary>
      <div class="table-scroll" style="margin-top:8px;">
        <table class="stats-table">
          <thead><tr><th style="width:60px;">教科</th>${MONTH_ORDER.map(m => `<th>${m}月</th>`).join('')}
            ${monthly.terms.map(t => `<th style="background:#eef2f7;">${esc(t.name)}</th>`).join('')}<th style="background:#e2e8f0;">年度計</th></tr></thead>
          <tbody>${monthlyRows}</tbody>
        </table>
      </div>
    </details>` : '';

  const zeroBlock = zeroRows.length ? `
    <details style="margin-bottom:10px;">
      <summary class="fold-label">未入力の教科 ${zeroRows.length}件</summary>
      <div class="table-scroll">
        <table class="stats-table" style="margin-top:6px;"><tbody>${zeroRows.join('')}</tbody></table>
      </div>
    </details>` : '';

  return `
    ${sc.label ? `<h3>${esc(sc.label)}</h3>` : ''}
    <div class="table-scroll">
    <table class="stats-table" style="margin-bottom:10px;">
      <thead><tr>
        <th style="width:200px;">教科</th><th style="width:64px;">今週</th>
        <th style="width:74px;">実施済${infoHTML('今日までの日付のコマ(中止を除く)。教育委員会への実施時数報告はこちらを使います')}</th>

        <th style="width:74px;">標準${infoHTML('学校教育法施行規則の年間標準授業時数。確保すべき目安で、原則として下回らないようにします(上回ることは差し支えありません)。クリックで上書きできます')}</th>

function downloadCSV(state, weekStart) {

      lines.push(row([

      <div class="checkline"><input type="checkbox" id="set-attendance" ${s.showAttendance ? 'checked' : ''}>

    </div>

    <div class="panel" id="sp-subjects">

        <tbody id="subjects-body">

            const hasChildren = s.subjects.some(c => c.parent === x.key);
            const parentOpts = hasChildren ? [] : s.subjects.filter(p => p.key !== x.key && !p.parent)
              .map(p => ({ value: p.key, label: p.name }));
            return `
            <tr data-s="${i}">

      <div class="checkline"><input type="checkbox" id="set-pmanager" ${s.printManagerBox ? 'checked' : ''}>

        <input type="text" data-set="stampBoxesText" value="${esc((s.stampBoxes || []).join('、'))}" placeholder="校長、教頭、担任"></div>
    </div>

    <div class="panel" id="sp-google">
      <details ${s.gas.url ? 'open' : ''}>
        <summary style="cursor:pointer;"><h2 style="display:inline;">Google連携</h2>
          <span class="hint">任意・未設定でも全機能使えます</span></summary>
        <p class="hint" style="margin-top:10px;">端末間の同期・カレンダー連携・メール提出が使えます。
          <a href="https://github.com/" id="gas-doc-link" target="_blank" rel="noopener">設定手順(約10分)</a></p>
        <div class="field"><label>接続先URL${infoHTML('設定手順の通りにデプロイすると表示される /exec で終わるURL')}</label>
          <input type="text" data-gas="url" value="${esc(s.gas.url)}" placeholder="https://script.google.com/macros/s/…/exec"></div>
        <div class="field"><label>合言葉${infoHTML('設定手順の手順2で自分で決めた合言葉(同期トークン)')}</label>
          <input type="password" data-gas="token" value="${esc(s.gas.token)}"></div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn" id="gas-test">接続テスト</button>
          ${s.gas.url && s.gas.token ? `<span style="display:inline-flex; align-items:center;"><button class="btn" id="gas-add-device">他の端末を追加</button>${infoHTML('スマホや別のPCを、URLと合言葉を手入力せずリンクを開くだけで接続できます')}</span>` : ''}
        </div>
        <div class="field" style="margin-top:8px;"><label>接続コードで設定${infoHTML('別の端末の「他の端末を追加」で出るリンク/コードを貼ると、接続先URLと合言葉をまとめて取り込みます。リンクを開けないGoogleサイト版(職場用)の接続に便利です')}</label>
          <div style="display:flex; gap:6px;">
            <input type="text" id="gas-connect-code" placeholder="接続リンク または コードを貼り付け">
            <button class="btn" id="gas-connect-apply" style="flex:0 0 auto;">接続</button>
          </div></div>

        <h3>行事の取り込み元</h3>
        <div id="gas-cal-list">
          ${(s.gas.calendarIds || []).length
            ? (s.gas.calendarIds || []).map(id => `<span class="subj-chip" style="background:#517b98; margin:2px 4px 2px 0;">${esc(s.gas.calendarNames?.[id] || id)}</span>`).join('')
            : '<span class="hint">メインカレンダー</span>'}
        </div>
        <button class="btn small" id="gas-cal-pick" style="margin-top:6px;">カレンダーを選ぶ</button>

        <h3>メール提出</h3>
        <div class="field"><label>提出先</label>
          <input type="text" data-gas="mailTo" value="${esc(s.gas.mailTo || '')}" placeholder="kocho@example.jp"></div>
        <div class="field"><label>差出人名</label>
          <input type="text" data-gas="senderName" value="${esc(s.gas.senderName || '')}" placeholder="${esc(s.teacherName || '')}"></div>
        <div class="checkline"><input type="checkbox" id="gas-auto" ${s.gas.auto ? 'checked' : ''}>
          <label for="gas-auto">自動で同期</label>${infoHTML('起動時に他端末の変更を取得し、編集後は15秒で自動保存します。複数端末で使う場合にON')}</div>
        <div class="checkline"><input type="checkbox" id="gas-autobackup" ${s.gas.autoBackup ? 'checked' : ''}>
          <label for="gas-autobackup">保存時にドライブへ自動バックアップ</label>${infoHTML('Googleドライブの「週案バックアップ」フォルダに最新20世代を保持します')}</div>
        <p class="hint" style="margin-top:8px;">児童生徒の個人名は入力しない運用を推奨します。</p>
      </details>
    </div>
  </div>
  `;

  wireSettings(root, ctx);
}

  if (s.mode === 'fukushiki') {
    return `
      <div style="display:flex; gap:10px;">
        <div class="field" style="flex:1;"><label>下学年</label>${selectHTML('fg0', gradeOpts, s.fukushikiGrades[0], { attrs: 'data-structural="fg0"' })}</div>
        <div class="field" style="flex:1;"><label>上学年</label>${selectHTML('fg1', gradeOpts, s.fukushikiGrades[1], { attrs: 'data-structural="fg1"' })}</div>

      ${selectHTML('bulkGrade', Array.from({ length: gradeMax }, (_, g) => ({ value: g + 1, label: `${g + 1}年` })), s.grade || 1, { attrs: 'aria-label="一括生成する学年" style="max-width:90px;"' })}

function wireSettings(root, ctx) {
  const s = store.settings;

  // カテゴリ単一表示: 選択したカテゴリのパネルだけを表示する
  const CAT_KEY = 'shuan-settings-cat';
  const panels = [...root.querySelectorAll('.settings-grid > .panel')];
  const validIds = panels.map(p => p.id);
  const showCategory = (id) => {
    if (!validIds.includes(id)) id = validIds[0];
    localStorage.setItem(CAT_KEY, id);
    panels.forEach(p => p.classList.toggle('active-cat', p.id === id));
    root.querySelectorAll('.set-chip').forEach(c => c.classList.toggle('active', c.dataset.goto === id));
    const det = root.querySelector('#' + id + ' details');
    if (det) det.open = true; // Google連携は開いた状態で見せる
  };
  root.querySelectorAll('.set-chip').forEach(chip => {
    chip.onclick = () => { showCategory(chip.dataset.goto); root.scrollTop = 0; window.scrollTo(0, 0); };
  });
  showCategory(localStorage.getItem(CAT_KEY) || 'sp-basic');

  // 単純テキスト/数値(再描画不要)
  root.querySelectorAll('[data-set]').forEach(inp => {
    inp.addEventListener('change', () => {
      const key = inp.dataset.set;
      if (key === 'stampBoxesText') {
        s.stampBoxes = inp.value.split(/[、,]/).map(t => t.trim()).filter(Boolean);
      } else if (inp.type === 'number') {
        s[key] = Number(inp.value);
      } else {
        s[key] = inp.value;
      }
      store.commit();
    });
  });

  // 学校種(リセットを伴う)
  root.querySelector('[name="schoolType"]').addEventListener('change', async (ev) => {
    const v = ev.target.value;
    if (v === s.schoolType) return;
    const ok = await confirmDialog('学校種を変更すると、教科と時程が既定値にリセットされます。よろしいですか?\n(週案・年間指導計画のデータは残りますが、教科の対応を確認してください)', { okLabel: '変更', danger: true });
    if (!ok) { ev.target.value = s.schoolType; return; }
    store.snapshot('学校種の変更'); // カスタマイズ済みの教科・時程を破棄するためUndo可能にする
    s.schoolType = v;
    s.subjects = defaultSubjects(v);
    s.periods = defaultPeriods(v);
    if (s.senkaSubject && !s.subjects.some(x => x.key === s.senkaSubject)) s.senkaSubject = ''; // 教科リセットに伴う実在チェック
    if (v === 'junior') {
      if (s.grade > 3) s.grade = 1;
      // 複式の学年も範囲(1〜3年)へ補正(5・6年のままだと週案・印刷の表示と設定画面が食い違う)
      const fg = s.fukushikiGrades.map(g => Math.min(g, 3));
      if (fg[0] >= fg[1]) { fg[1] = Math.min(3, Math.max(2, fg[1])); fg[0] = fg[1] - 1; }
      s.fukushikiGrades = fg;
    }
    store.commit();
    ctx.rerender();
    toast('学校種を変更しました', 'info', 4000, { label: '元に戻す', onClick: () => { store.undo(); ctx.rerender(); } });
  });

  // 学年・複式学年(再描画して標準時数等を更新)。
  // 年間週数の既定(小1=34週/その他35週)は、ユーザーが独自値にしていなければ学年に追従する。
  // 複式は下学年で判定(オンボーディング・年度更新ウィザードと同じ規則)。
  const followHoursBase = () => {
    if (s.hoursBase === 34 || s.hoursBase === 35) {
      const baseGrade = s.mode === 'fukushiki' ? s.fukushikiGrades[0] : s.grade;
      s.hoursBase = (s.schoolType === 'elementary' && baseGrade === 1) ? 34 : 35;
    }
  };
  const gradeSel = root.querySelector('[name="grade"][data-structural]');
  if (gradeSel) gradeSel.addEventListener('change', () => {
    s.grade = Number(gradeSel.value);
    followHoursBase();
    store.commit(); ctx.rerender();
  });
  const fg0 = root.querySelector('[name="fg0"]');
  if (fg0) fg0.addEventListener('change', () => { s.fukushikiGrades[0] = Number(fg0.value); followHoursBase(); store.commit(); ctx.rerender(); });
  const fg1 = root.querySelector('[name="fg1"]');
  if (fg1) fg1.addEventListener('change', () => { s.fukushikiGrades[1] = Number(fg1.value); followHoursBase(); store.commit(); ctx.rerender(); });

  // 土曜・印刷チェック
  root.querySelector('#set-sat').addEventListener('change', (ev) => { s.saturday = ev.target.checked; store.commit(); ctx.rerender(); });
  root.querySelector('#set-ptime').addEventListener('change', (ev) => { s.printShowTimes = ev.target.checked; store.commit(); });
  root.querySelector('#set-phours').addEventListener('change', (ev) => { s.printShowHours = ev.target.checked; store.commit(); });
  root.querySelector('#set-pdetails').addEventListener('change', (ev) => { s.printShowPlanDetails = ev.target.checked; store.commit(); });
  root.querySelector('#set-pmanager').addEventListener('change', (ev) => { s.printManagerBox = ev.target.checked; store.commit(); });
  root.querySelector('#set-pera').addEventListener('change', (ev) => { s.printEra = ev.target.checked; store.commit(); });
  root.querySelector('[name="uiScale"]').addEventListener('change', (ev) => {
    s.uiScale = ev.target.value;
    document.documentElement.classList.toggle('ui-large', s.uiScale === 'large');
    store.commit();
  });
  // 学級表記のライブプレビュー(「2年2年1組」の二重表記を構造的に防ぐ)
  const classInput = root.querySelector('[data-set="className"]');
  const classPreview = root.querySelector('#class-preview');
  if (classInput && classPreview) {
    classInput.addEventListener('input', () => {
      classPreview.textContent = `→ 印刷: ${s.grade}年${classInput.value.trim()}`;
    });
  }
  // 設定手順リンク(GitHub Pages配信時は同リポジトリのdocsへ。ブラウザで読めるHTML版)
  const docLink = root.querySelector('#gas-doc-link');
  if (docLink) docLink.href = new URL('docs/gas-setup.html', location.href.replace(/[^/]*$/, '')).href;
  root.querySelector('[name="printOrientation"]').addEventListener('change', (ev) => { s.printOrientation = ev.target.value; store.commit(); });
  root.querySelector('[name="printFontSize"]').addEventListener('change', (ev) => { s.printFontSize = ev.target.value; store.commit(); });

  // 担任形態
  root.querySelectorAll('.mode-card').forEach(card => {
    card.onclick = () => {
      if (s.mode === card.dataset.mode) return;
      s.mode = card.dataset.mode;
      if (s.mode === 'senka' && !s.senkaClasses.length) {
        s.senkaClasses = [{ id: uid(), label: '', grade: s.grade || 1 }];
      }
      followHoursBase(); // 複式↔他形態で基準学年が変わると週数の既定も追従させる
      store.commit();
      ctx.rerender();
    };
  });

  // 専科: 担当教科
  const senkaSubjSel = root.querySelector('[name="senkaSubject"]');
  if (senkaSubjSel) senkaSubjSel.addEventListener('change', () => { s.senkaSubject = senkaSubjSel.value; store.commit(); });

  // 専科学級テーブル
  const senkaBody = root.querySelector('#senka-body');
  if (senkaBody) {
    senkaBody.querySelectorAll('tr').forEach(tr => {
      const i = Number(tr.dataset.c);
      tr.querySelector('[name="label"]').addEventListener('change', (ev) => { s.senkaClasses[i].label = ev.target.value; store.commit(); });
      tr.querySelector('[name="grade"]').addEventListener('change', (ev) => { s.senkaClasses[i].grade = Number(ev.target.value); store.commit(); });
      tr.querySelector('[data-crm]').onclick = async () => {
        // 専科は最低1学級必要(全削除でscope=nullの授業が量産されるのを防ぐ)
        if (s.senkaClasses.length <= 1) { toast('専科は学級が最低1つ必要です（担当形態を変える場合は上のモードから）', 'info', 3500); return; }
        // 入力済みコマ数を数えて正確に伝える(週＋基本時間割の両方)
        const id = s.senkaClasses[i].id;
        let count = 0;
        const cellSources = [...Object.values(store.state.weeks), ...(store.state.baseTimetables || [])];
        for (const w of cellSources) {
          for (const cell of Object.values(w.cells || {})) {
            count += (cell.entries || []).filter(e => e.scope === id).length;
          }
        }
        const ok = await confirmDialog(
          `学級「${s.senkaClasses[i].label || '(無名)'}」を削除しますか?` +
          (count ? `\nこの学級の入力済み ${count}コマ は残りの先頭学級へ付け替えます` : ''),
          { okLabel: '削除', danger: true });
        if (!ok) return;
        store.snapshot('学級の削除');
        s.senkaClasses.splice(i, 1);
        // 死んだ学級IDを先頭学級へ付け替える(週・基本時間割の両方。集計から無言で消えるのを防ぐ)
        const fallback = s.senkaClasses[0]?.id ?? null;
        for (const w of cellSources) {
          for (const cell of Object.values(w.cells || {})) {
            for (const e of cell.entries || []) { if (e.scope === id) e.scope = fallback; }
          }
        }
        // 削除した学級が「直前に選んだ学級」(新規コマの既定)なら無効化する
        // (残したままだと以後の新規コマが存在しない学級に割り当てられ、集計から消える)
        if (ctx.lastScope === id) {
          ctx.lastScope = null;
          try { localStorage.removeItem('shuan-last-scope'); } catch {}
        }
        store.commit(); ctx.rerender();
      };
      tr.querySelector('[data-cup]').onclick = () => { if (i > 0) { swap(s.senkaClasses, i, i - 1); store.commit(); ctx.rerender(); } };
      tr.querySelector('[data-cdown]').onclick = () => { if (i < s.senkaClasses.length - 1) { swap(s.senkaClasses, i, i + 1); store.commit(); ctx.rerender(); } };

  root.querySelectorAll('#periods-body tr').forEach(tr => {

    tr.querySelector('[name="type"]').addEventListener('change', (ev) => { p.type = ev.target.value; store.commit(); ctx.rerender(); });

        const [h, m] = p.start.split(':').map(Number);
        const t = h * 60 + m + p.minutes;
        p.end = `${String(Math.floor(t / 60) % 24).padStart(2, '0')}:${String(t % 60).padStart(2, '0')}`;
        tr.querySelector('[name="end"]').value = p.end;

      if (p.type === 'module') {

      const key = cellKey(Number(sel.dataset.d), sel.dataset.p);
      base.cells = base.cells || {};

      const prev = base.cells[key]?.entries?.[0];
      if (!subj) {
        delete base.cells[key];
      } else if (subj === '__memo__') {
        // 活動(会議・委員会など)コマ: 毎週くり返す会議等。教科なし・時数に数えない。
        const a = newEntry();
        a.subjectKey = ''; a.noCount = true;
        a.unitName = (prev && isActivity(prev)) ? prev.unitName : '';
        base.cells[key] = { entries: [a] };
      } else {
        const cell = base.cells[key] || (base.cells[key] = { entries: [] });
        const e = cell.entries[0] && !isActivity(cell.entries[0]) ? cell.entries[0] : (cell.entries = [newEntry()])[0];
        e.subjectKey = subj; e.noCount = false; e.unitName = '';

  // 学期の区切り: 月・日のセレクト(入力形式エラーを構造的になくす)
  const setTermEnd = (i) => {
    const m = Number(root.querySelector(`[data-term-m="${i}"]`)?.value) || 7;
    const dSel = root.querySelector(`[data-term-d="${i}"]`);
    let d = Number(dSel?.value) || 31;
    // 実在しない日付(6/31等)は月末日へ補正して保存・表示する。
    // 不正な日付のまま保存すると、その学期と次学期の間に隙間日ができ時数集計から漏れる
    const y = m >= 4 ? s.fiscalYear : s.fiscalYear + 1;
    const maxD = new Date(y, m, 0).getDate();
    if (d > maxD) {
      d = maxD;
      if (dSel) dSel.value = String(d);
    }
    s.termEnds[i] = `${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    store.commit();
  };
  root.querySelectorAll('[data-term-m]').forEach(sel => {
    sel.addEventListener('change', () => setTermEnd(Number(sel.dataset.termM)));
  });
  root.querySelectorAll('[data-term-d]').forEach(sel => {
    sel.addEventListener('change', () => setTermEnd(Number(sel.dataset.termD)));
  });
  root.querySelector('#set-autolayout')?.addEventListener('change', (ev) => { s.autoLayout = ev.target.checked; store.commit(); });
  root.querySelector('#set-holidays').addEventListener('change', (ev) => { s.showHolidays = ev.target.checked; store.commit(); });
  root.querySelector('#set-daynotes').addEventListener('change', (ev) => { s.showDayNotes = ev.target.checked; store.commit(); });
  root.querySelector('#set-attendance').addEventListener('change', (ev) => { s.showAttendance = ev.target.checked; store.commit(); });

  // 長期休業
  root.querySelectorAll('#breaks-body tr').forEach(tr => {
    const i = Number(tr.dataset.b);
    const b = s.breaks[i];
    tr.querySelector('[name="bname"]').addEventListener('change', (ev) => { b.name = ev.target.value; store.commit(); });
    tr.querySelector('[name="bfrom"]').addEventListener('change', (ev) => { b.from = ev.target.value; store.commit(); });
    tr.querySelector('[name="bto"]').addEventListener('change', (ev) => { b.to = ev.target.value; store.commit(); });
    tr.querySelector('[data-brm]').onclick = () => {

      toast('授業日を解除しました', 'info', 2600, { label: '元に戻す', onClick: () => { store.toggleClassDay(b.dataset.classrm); ctx.rerender(); } });

    if ((s.classDays || []).includes(d)) { toast('すでに登録済みです', 'info'); return; }

  root.querySelector('#gas-test').onclick = async () => {

      toast('接続テスト中…');

        // 成功した流れのまま自動同期を始められるように(設定項目を探させない)
        toast('接続できました', 'info', 8000, {
          label: '自動同期ON',

        });
      } else {
        toast('接続できました');

      toast('接続失敗: ' + e.message, 'error', 6000, {

  if (addDeviceBtn) addDeviceBtn.onclick = async () => {
    const { encodeConnect } = await Promise.resolve(__M["gas.js"]);
    const code = encodeConnect(s.gas.url, s.gas.token);
    const link = location.origin + location.pathname + '#connect=' + code;
    openModal(`
      <h2>他の端末を追加</h2>
      <p class="hint">新しい端末(スマホ・別のPC)で<b>このリンクを開くだけ</b>で、URL・合言葉の入力なしに接続され、保存済みのデータを自動で取得します。<br>
        スマホへは、自分宛のメールやGoogle Keep・LINEのKeepメモにリンクを貼って開くのが簡単です。</p>
      <div class="field"><label>接続リンク</label>
        <input type="text" id="connect-link" value="${esc(link)}" readonly style="font-size:12px;"></div>
      <div style="display:flex; gap:8px;">
        <button class="btn primary" id="connect-copy">リンクをコピー</button>
        ${navigator.share ? '<button class="btn" id="connect-share">共有</button>' : ''}
      </div>
      <p class="hint" style="margin-top:12px; color:#9a3412;">このリンクには合言葉が含まれます。自分の端末だけで使い、他人と共有しないでください。</p>
      <div class="modal-foot"><button class="btn" data-close>閉じる</button></div>
    `, (modal, close) => {
      modal.querySelector('[data-close]').onclick = close;
      const input = modal.querySelector('#connect-link');
      modal.querySelector('#connect-copy').onclick = async () => {
        try { await navigator.clipboard.writeText(link); toast('リンクをコピーしました'); }
        catch { input.select(); document.execCommand('copy'); toast('リンクをコピーしました'); }
      };
      const shareBtn = modal.querySelector('#connect-share');
      if (shareBtn) shareBtn.onclick = () => navigator.share({ title: 'ルーズリーフ 接続リンク', url: link }).catch(() => {});
    });
  };

  // 接続コードを貼って接続(リンクが届かないGoogleサイト版でもURL・合言葉を一括設定)。
