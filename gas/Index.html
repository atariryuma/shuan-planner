<style>
/* ============ 週案プランナー 画面用スタイル ============ */
:root {
  /* —— ニュートラル・ランプ(紙白〜墨) —— */
  --gray-50:  #f8fafc;
  --gray-100: #f1f5f9;
  --gray-150: #eaeff5;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --gray-900: #0f172a;
  /* —— アクセント・ランプ(単一の青系) —— */
  --accent-50:  #eff6ff;
  --accent-100: #dbeafe;
  --accent-200: #bfdbfe;
  --accent-300: #93c5fd;
  --accent-500: #3b82f6;
  --accent-600: #2563eb;
  --accent-700: #1d4ed8;

  /* —— セマンティック —— */
  --bg: #eef1f6;
  --panel: #ffffff;
  --panel-2: var(--gray-50);   /* 微差の面(ヘッダ・サマリー等) */
  --ink: #1e293b;
  --ink-2: #475569;
  --muted: #64748b;
  --line: #e4e8ef;             /* 繊細なヘアライン */
  --line-strong: #cbd5e1;
  --accent: #2563eb;
  --accent-soft: #dbeafe;
  --accent-ink: #1d4ed8;       /* 明るい面の上のアクセント文字 */
  --danger: #dc2626;  --danger-soft: #fef2f2;
  --warn:   #b45309;  --warn-soft:   #fffbeb;
  --ok:     #15803d;  --ok-soft:     #f0fdf4;

  /* —— スペーシング(8ptスケール) —— */
  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-8: 32px;

  /* —— 角丸 —— */
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 18px; --r-full: 999px;
  --radius: var(--r-md);

  /* —— タイポ —— */
  --t-xs: 12px; --t-sm: 13px; --t-base: 15px; --t-md: 17px; --t-lg: 20px; --t-xl: 24px;

  /* —— エレベーション(淡く多層) —— */
  --e-1: 0 1px 2px rgba(15, 23, 42, .04), 0 1px 3px rgba(15, 23, 42, .06);
  --e-2: 0 1px 3px rgba(15, 23, 42, .06), 0 6px 16px rgba(15, 23, 42, .07);
  --e-3: 0 8px 24px rgba(15, 23, 42, .12), 0 24px 56px rgba(15, 23, 42, .16);
  --shadow: var(--e-2);

  /* —— モーション —— */
  --ease: cubic-bezier(.2, .7, .2, 1);
  --ease-out: cubic-bezier(.16, 1, .3, 1);
  --dur-1: 120ms; --dur-2: 180ms; --dur-3: 240ms;

  --focus-ring: 0 0 0 2px var(--panel), 0 0 0 4px var(--accent-300);

  font-size: 15px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro JP",
    "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Yu Gothic", "Meiryo", sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  letter-spacing: .01em;
}

/* キーボード操作時のみ、全インタラクティブ要素に上質なフォーカスリング */
:where(button, a, input, select, textarea, summary, [tabindex]):focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
  border-radius: var(--r-sm);
}
/* 強制カラー(Windowsハイコントラスト等)では box-shadow が描画されず、フォーカスリングが
   完全に消えてキーボード操作位置を見失う。outline を併用して必ず見えるようにする(a11y)。 */
@media (forced-colors: active) {
  :where(button, a, input, select, textarea, summary, [tabindex]):focus-visible {
    outline: 2px solid Highlight;
    outline-offset: 2px;
  }
}

/* 細身で控えめなスクロールバー */
* { scrollbar-width: thin; scrollbar-color: var(--gray-300) transparent; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: var(--r-full); border: 2px solid transparent; background-clip: content-box; }
*::-webkit-scrollbar-thumb:hover { background: var(--gray-400); background-clip: content-box; }

::selection { background: var(--accent-200); color: var(--gray-900); }

.print-only { display: none; }

/* ---------- top bar ---------- */
.topbar {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 8px 16px;
  background: rgba(255, 255, 255, .72);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 50;
  flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 8px; }
.brand h1 { font-size: var(--t-md); margin: 0; font-weight: 700; letter-spacing: .01em; }

.tabs { display: flex; gap: 2px; flex: 1; }
.tab {
  position: relative;
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
  border: none; background: none; padding: 8px 14px; cursor: pointer;
  font-size: 14px; color: var(--muted); border-radius: var(--r-sm);
  transition: color var(--dur-1) var(--ease), background var(--dur-1) var(--ease);
}
.tab:hover { color: var(--ink); background: var(--gray-100); }
.tab.active { color: var(--accent); font-weight: 700; }
.tab.active::after {
  content: ''; position: absolute; left: 12px; right: 12px; bottom: -1px; height: 2.5px;
  background: var(--accent); border-radius: var(--r-full);
  animation: tab-underline var(--dur-2) var(--ease-out);
}
@keyframes tab-underline { from { transform: scaleX(.4); opacity: 0; } to { transform: none; opacity: 1; } }

/* 狭い画面ではヘッダーを1行に収め、今日の授業を見える高さに保つ
   (ブランド名は隠しアイコンのみ・タブは横スクロール・保存表示と印刷ラベルは省く) */
@media (max-width: 640px) {
  .topbar { flex-wrap: nowrap; gap: 8px; padding: 6px 10px; }
  .brand h1 { display: none; }
  .tabs { flex: 1; min-width: 0; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; gap: 0; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 0 0 auto; padding: 8px 10px; }
  .topbar-actions { flex: 0 0 auto; }
  .save-indicator { display: none; }
  .btn-label { display: none; }
}

.topbar-actions { display: flex; align-items: center; gap: 10px; }
/* 小型文字のためWCAG 1.4.3の4.5:1を満たす濃さにする */
.save-indicator { color: #15803d; font-size: 11px; transition: color .3s; }
.save-indicator.saving { color: #b45309; }

/* ---------- buttons ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  border: 1px solid var(--line-strong); background: var(--panel); color: var(--ink);
  padding: 7px 14px; border-radius: var(--r-sm); cursor: pointer; font-size: 14px;
  font-family: inherit; font-weight: 500;
  transition: background var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease),
    box-shadow var(--dur-1) var(--ease), transform var(--dur-1) var(--ease);
}

/* モノクロ・ライン アイコン(currentColorで文字色に追従) */
.ic { width: 1.15em; height: 1.15em; flex: 0 0 auto; }
.btn .ic { width: 16px; height: 16px; }
.tab .ic { width: 18px; height: 18px; }
.brand-app-icon { width: 26px; height: 26px; display: block; border-radius: 6px; }
.set-chip .ic { width: 15px; height: 15px; }
.panel h2 .ic { width: 18px; height: 18px; margin-right: 8px; vertical-align: -.2em; }
.menu-item .ic { width: 17px; height: 17px; }
.empty-state .empty-ic .ic { width: 46px; height: 46px; stroke-width: 1.4; color: var(--gray-400); }
.day-noschool .dn-ic .ic, .day-empty .de-ic .ic { width: 40px; height: 40px; stroke-width: 1.4; }
.day-op .op-ic .ic { width: 22px; height: 22px; }
.btn:hover { background: var(--gray-100); border-color: var(--gray-300); }
.btn:active { transform: translateY(.5px) scale(.99); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; box-shadow: var(--e-1); }
.btn.primary:hover { background: var(--accent-700); border-color: var(--accent-700); }
.btn.danger { color: var(--danger); border-color: #fecaca; }
.btn.danger:hover { background: var(--danger-soft); border-color: #fca5a5; }
.btn.small { padding: 3px 9px; font-size: 12.5px; }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.ghost:hover { background: var(--gray-100); }
.btn:disabled { opacity: .5; cursor: default; }
.btn:disabled:active { transform: none; }

/* ---------- main ---------- */
.main { padding: 14px 16px 60px; max-width: 1500px; margin: 0 auto; }

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--e-1);
  padding: 16px;
  margin-bottom: 16px;
}
.panel h2 { margin: 0 0 12px; font-size: 16px; letter-spacing: .01em; }
.panel h3 { margin: 18px 0 8px; font-size: 14.5px; color: #374151; }
.hint { color: var(--muted); font-size: 12.5px; line-height: 1.6; }

/* ---------- week navigation ---------- */
.week-nav {
  display: flex; align-items: center; gap: 8px 10px; flex-wrap: wrap; margin-bottom: 12px;
}
.week-nav .wn-move { display: flex; align-items: center; gap: 6px; }
.week-nav .wn-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.week-nav .week-title { font-size: 17px; font-weight: 700; white-space: nowrap; }
.week-nav .week-no { color: var(--muted); font-weight: 500; font-size: 13.5px; margin-left: 8px; }
.week-nav .spacer { flex: 1; }
.week-nav input[type="date"] { padding: 5px 8px; border: 1px solid var(--line); border-radius: 8px; }
/* 狭い画面: 1行目=◀今週▶＋週タイトル / 2行目=表示切替＋⋯ の2行に整理。
   日付ピッカーはタイトルのタップで開く(ヘッダーを圧迫しない)。 */
@media (max-width: 560px) {
  .week-nav { gap: 8px; }
  .week-nav .wn-move { order: 1; }
  .week-nav .week-title { order: 2; flex: 1; font-size: 16px; cursor: pointer; }
  .week-nav .week-title::after { content: "▾"; font-size: 11px; color: var(--muted); margin-left: 4px; }
  .week-nav input[type="date"] { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); border: 0; }
  .week-nav .spacer { display: none; }
  .week-nav .wn-actions { order: 3; margin-left: auto; }
}

/* ---------- week grid ---------- */
.week-grid-wrap { overflow-x: auto; }
table.week-grid {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed;
  background: var(--panel);
}
.week-grid th, .week-grid td {
  border: 1px solid var(--line);
  vertical-align: top;
  padding: 0;
}
.week-grid th.corner { width: 72px; background: #f8fafc; }
.week-grid thead th {
  background: #f8fafc; font-size: 13px; padding: 6px 4px; text-align: center;
}
.week-grid thead .day-head { line-height: 1.35; }
.week-grid thead .day-head .dow { font-size: 14.5px; font-weight: 700; }
.week-grid thead .day-head .date { color: var(--muted); font-weight: 500; font-size: 12px; }
.week-grid thead .day-head.sat .dow { color: #2563eb; }
.week-grid thead .day-head.sun .dow { color: #dc2626; }
.week-grid thead .day-head.holiday-mark .dow,
.week-grid thead .day-head.holiday-mark .date { color: #dc2626; }
.week-grid thead .day-head .hol-name,
.week-grid thead .day-head .brk-name {
  display: inline-block; margin-top: 2px; font-size: 10px; font-weight: 700; line-height: 1.5;
  padding: 0 7px; border-radius: var(--r-full); white-space: nowrap;
}
.week-grid thead .day-head .hol-name { background: #fbd0d0; color: #b91c1c; }
.week-grid thead .day-head .brk-name { background: #cfe0fa; color: #075985; }
/* 振替授業日: 本来は休みだが授業日にした日。授業日として通常表示しつつ由来を示す */
.week-grid thead .day-head .makeup-name {
  display: inline-block; margin-top: 2px; font-size: 10px; font-weight: 700; line-height: 1.5;
  padding: 0 7px; border-radius: var(--r-full); white-space: nowrap;
  background: #dcfce7; color: #15803d;
}
.week-grid thead .day-head.in-break .dow,
.week-grid thead .day-head.in-break .date { color: #64748b; }
.week-grid .pattern-row td { background: #fafafa; }

td.cell.off {
  background: repeating-linear-gradient(45deg, #f1f5f9, #f1f5f9 6px, #e8edf3 6px, #e8edf3 12px);
  cursor: default;
}
td.cell.off:hover { background: repeating-linear-gradient(45deg, #f1f5f9, #f1f5f9 6px, #e8edf3 6px, #e8edf3 12px); }
/* 日課で無効化された校時に入力済みのコマが残っているときのマーカー */
td.cell.off .off-hidden {
  display: inline-block; font-size: 9.5px; font-weight: 700; color: #9a3412;
  background: rgba(255, 255, 255, .8); border-radius: 4px; padding: 1px 4px; margin: 3px;
}

.week-grid .period-head {
  background: #f8fafc; text-align: center; padding: 4px 2px; font-size: 12.5px;
}
.week-grid .period-head .p-label { font-weight: 700; font-size: 14px; display: block; }
.week-grid .period-head .p-time { color: var(--muted); font-size: 10.5px; display: block; }
.week-grid .period-head .p-coef { color: #b45309; font-size: 10px; display: block; }

.event-row td { background: #fffbeb; }
/* 行事行のほか、メモ行・出欠行(event-rowクラスなしの<tr>)のtextareaにも当てる */
.week-grid .event-input {
  width: 100%; border: none; background: transparent; padding: 5px 6px;
  font-size: 12px; resize: none; min-height: 30px; font-family: inherit; color: #92400e;
}
.week-grid .event-input:focus { outline: 2px solid var(--accent); outline-offset: -2px; background: #fff; }
.event-row .period-head { font-size: 12px; color: #92400e; background: #fef3c7; }

td.cell { height: 64px; cursor: pointer; position: relative; transition: background var(--dur-1) var(--ease); }
/* ホバー: 塗り＋枠(リング)で示す。授業が入ったコマは中身が背景を覆うため、
   塗りだけだと変化が見えない。枠ならコンテンツの有無に関わらず一目で分かる。 */
td.cell:hover { background: var(--accent-50); }
/* ホバーの枠は「日課で無効な校時(.off)」以外すべてに出す。祝日・休業のコマも
   クリックで編集でき(振替授業など)、対話できることを示す。 */
td.cell:not(.off):hover { box-shadow: inset 0 0 0 2px var(--accent-300); z-index: 1; }
td.cell.drag-over { outline: 2px dashed var(--accent); outline-offset: -3px; background: var(--accent-soft); }
td.cell.module-cell { background: var(--gray-50); }
td.cell.module-cell:hover { background: var(--accent-50); }

.entry { padding: 3px 5px 4px; min-height: 30px; }
.entry + .entry { border-top: 1px dashed var(--line); }
.entry .e-head { display: flex; align-items: center; gap: 4px; }
.subj-chip {
  display: inline-block; font-size: 11px; font-weight: 700; color: #fff;
  border-radius: 5px; padding: 1px 6px; white-space: nowrap;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .14), 0 1px 1px rgba(15, 23, 42, .12);
}
.entry .e-scope { font-size: 10.5px; color: var(--muted); font-weight: 600; }
.entry .e-text { font-size: 11.5px; line-height: 1.4; margin-top: 2px; word-break: break-word; }
.entry .e-text.manual { color: #1e3a8a; }
.entry .e-plan-line {
  display: flex; align-items: flex-start; gap: 3px; margin-top: 2px;
  color: var(--gray-600); font-size: 10.5px; line-height: 1.35; word-break: break-word;
}
/* 簡潔表示: 学習活動・評価規準の行を隠す(本時のねらいまで。情報は編集画面・印刷に残る) */
.week-grid.density-compact .e-plan-line { display: none; }
.entry .e-plan-line > span {
  flex: 0 0 auto; border: 1px solid #94a3b8; border-radius: 3px;
  padding: 0 2px; color: #334155; font-size: 9px; font-weight: 700;
}
.entry .e-assessment { color: #7c2d12; }
.entry .e-viewpoint {
  flex: 0 0 auto; border-radius: 3px; background: #ffedd5; color: #9a3412;
  padding: 0 3px; font-size: 9px;
}
.entry .e-note { font-size: 10.5px; color: var(--muted); margin-top: 1px; word-break: break-word; }
.entry .e-flag { font-size: 9.5px; color: #b45309; }
/* ロック表示: 鍵チップ＋コマ左に淡いオレンジの帯(控えめ。重いハッチは不採用) */
.entry .e-flag.e-lock { display: inline-flex; align-items: center; color: #ea580c; }
.entry .e-flag.e-lock svg { width: 12px; height: 12px; }
.entry.locked { box-shadow: inset 2.5px 0 0 #fb923c; padding-left: 4px; border-radius: 3px; }
.cell-clear {
  position: absolute; top: 2px; right: 2px; border: none; background: rgba(255,255,255,.85);
  color: var(--muted); border-radius: 4px; cursor: pointer; font-size: 11px; line-height: 1;
  padding: 3px 4px; display: none;
}
td.cell:hover .cell-clear { display: block; }
.cell-clear:hover { color: var(--danger); }

.cell-empty { color: #c4ccd8; font-size: 16px; text-align: center; padding-top: 18px; user-select: none; }

/* 活動(会議・委員会・クラブ等。教科なし・時数に数えない)。授業カードと区別する淡色メモ。 */
.entry.activity { display: flex; align-items: flex-start; gap: 4px; color: #64748b; font-size: 12px; line-height: 1.35; padding: 2px; background: #f6f8fb; border-radius: 4px; }
.entry.activity svg { width: 13px; height: 13px; flex: none; margin-top: 1px; opacity: .8; }
.entry.activity .e-activity-name { word-break: break-word; font-weight: 600; }
/* 予定・活動コマ: スロット全体を淡いグレーの面にして「授業でない枠」を一目で示す。
   ホバーも控えめなグレーに(授業/今日列の青ベタが空白を埋めて「選択しっぱなし」に見える問題を解消)。 */
td.cell.activity-cell, td.cell.activity-cell.today-col { background: #f1f4f8; }
td.cell.activity-cell:hover, td.cell.activity-cell.today-col:hover { background: #e8ecf2; }
td.cell.activity-cell .entry.activity { background: transparent; padding: 3px 4px; }

/* コマ編集: 活動(会議・委員会等)の名前プリセット／計画なしコマの単元・時数入力 */
.memo-presets { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 8px; }
.memo-preset { padding: 4px 11px; font-size: 12.5px; }
.act-name { width: 100%; }
.planless-unit { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0 4px; }
.planless-unit .pu-field { display: flex; flex-direction: column; gap: 2px; font-size: 12px; color: var(--muted); flex: 1 1 auto; }
.planless-unit .pu-num { flex: 0 0 84px; }
.planless-unit input { font-size: 14px; }
.oc-to-memo { width: 100%; justify-content: center; margin-top: 8px; color: var(--muted); }
.oc-to-memo svg { width: 15px; height: 15px; }
/* コマ編集の見出し行: タイトル＋右上「⋯」(このコマへの操作) */
.oc-titlebar { display: flex; align-items: center; gap: 8px; }
.oc-titlebar h2 { flex: 1; margin: 0; }
.oc-titlebar .oc-menu { flex: none; }
.oc-titlebar .oc-menu > summary { padding: 4px 10px; font-size: 18px; line-height: 1; color: var(--muted); }
.oc-menu .menu-item svg { width: 16px; height: 16px; }

/* ---------- week notes ---------- */
.week-notes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
.week-notes label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 4px; color: #374151; }
.week-notes textarea {
  width: 100%; min-height: 72px; border: 1px solid var(--line); border-radius: 8px;
  padding: 8px; font-family: inherit; font-size: 13px; resize: vertical;
}
@media (max-width: 800px) { .week-notes { grid-template-columns: 1fr; } }

/* ---------- cell editor popup ---------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(15, 23, 42, .4); z-index: 100;
  -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
  display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px;
  overflow-y: auto;
  animation: modal-fade var(--dur-2) var(--ease-out);
}
.modal {
  background: var(--panel); border-radius: var(--r-xl); box-shadow: var(--e-3);
  border: 1px solid var(--gray-200);
  width: 560px; max-width: 100%; padding: 18px 20px 16px; margin-bottom: 40px;
  max-height: 90dvh; overflow-y: auto; /* 長いモーダルでも内部スクロールでフッターに届く */
  animation: modal-pop var(--dur-3) var(--ease-out);
}
@keyframes modal-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes modal-pop { from { opacity: 0; transform: translateY(8px) scale(.985); } to { opacity: 1; transform: none; } }
.modal h2 { margin: 0 0 14px; font-size: 16px; letter-spacing: .01em; }
.modal .modal-foot {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;
  position: sticky; bottom: -16px; background: var(--panel);
  padding: 10px 0 16px; margin-bottom: -16px;
  box-shadow: 0 -8px 8px -8px rgba(0,0,0,.18);
}
.modal .modal-foot .left { margin-right: auto; }

.field { margin-bottom: 12px; }
.field > label { display: block; font-size: 12.5px; font-weight: 700; color: #374151; margin-bottom: 4px; }
.field input[type="text"], .field input[type="number"], .field input[type="password"],
.field input[type="time"], .field input[type="date"],
.field select, .field textarea {
  width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px;
  font-size: 14px; font-family: inherit; background: #fff;
}
.field textarea { resize: vertical; min-height: 64px; }
.field .inline { display: flex; gap: 8px; align-items: center; }
.field .inline > * { flex: 1; }
.checkline { display: flex; align-items: center; gap: 6px; font-size: 13px; margin: 6px 0; }
.checkline input { width: 15px; height: 15px; }

.subject-palette { display: flex; flex-wrap: wrap; gap: 5px; margin: 4px 0 8px; }
.subject-palette button {
  /* opacityで白へ薄めると白文字のコントラスト(各色4.5:1設計)が崩れるため不透明のまま。
     ホバーは背景を明るくしない brightness(.92)+持ち上げで示す(WCAG 1.4.3保持) */
  border: 1.5px solid transparent; border-radius: 6px; color: #fff; font-size: 12px; font-weight: 700;
  padding: 4px 9px; cursor: pointer;
}
.subject-palette button:hover { filter: brightness(.94); }
.subject-palette button.selected { outline: 2.5px solid #1f2937; outline-offset: 1px; }

.auto-preview {
  background: #f0f7ff; border: 1px dashed #93c5fd; border-radius: 8px; padding: 8px 10px;
  font-size: 12.5px; color: #1e3a8a; margin-bottom: 10px; line-height: 1.5;
}
.auto-preview .label { font-size: 10.5px; color: #2563eb; font-weight: 700; display: block; }
.auto-plan-preview { color: #1e293b; }
.auto-plan-title { display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px 8px; margin-bottom: 5px; }
.auto-plan-title .label { width: 100%; }
.auto-plan-title strong { color: #1e3a8a; }
.auto-plan-title > span:last-child { color: #475569; font-size: 11px; }
.auto-plan-item { display: grid; grid-template-columns: 88px 1fr; gap: 7px; padding: 4px 0; border-top: 1px solid #dbeafe; }
.auto-plan-item b { color: #334155; font-size: 11px; }
.auto-plan-item em {
  display: inline-block; margin-right: 5px; border-radius: 4px; padding: 0 5px;
  background: #ffedd5; color: #9a3412; font-style: normal; font-size: 10px; font-weight: 700;
}
/* この時間だけ別の単元(pin)ピッカー */
/* 「この時間にやること」3択(計画どおり/別の単元/計画外) */
.lesson-mode { display: inline-flex; background: var(--gray-100); border-radius: var(--r-full, 999px); padding: 3px; gap: 2px; }
.lesson-mode .lm-btn { border: none; background: transparent; color: var(--muted); font-size: 12.5px; font-weight: 600; padding: 5px 12px; border-radius: var(--r-full, 999px); cursor: pointer; }
.lesson-mode .lm-btn:hover { color: var(--ink); }
.lesson-mode .lm-btn.selected { background: var(--panel); color: var(--accent); box-shadow: var(--e-1); }
.up-body { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 8px; margin-top: 8px; }
.up-label { font-size: 11px; font-weight: 700; color: var(--muted); }
.up-body select { flex: 1 1 160px; min-width: 120px; }
/* 単元を切り上げる(単元見出しの隣にインライン) */
.eu-inline { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--ink-2); margin-left: 4px; cursor: pointer; }
.eu-inline input { width: 15px; height: 15px; }

.auto-unit-details { margin-top: 5px; border-top: 1px solid #bfdbfe; padding-top: 5px; }
.auto-unit-details summary { cursor: pointer; color: #1d4ed8; font-weight: 700; font-size: 11px; }
.auto-criteria { margin: 4px 0 0; }
.auto-plan-row { display: grid; grid-template-columns: 88px 1fr; gap: 7px; padding: 3px 0; }
.auto-plan-row dt { color: #475569; font-size: 10.5px; font-weight: 700; }
.auto-plan-row dd { margin: 0; }
@media (max-width: 520px) {
  .auto-plan-item, .auto-plan-row { grid-template-columns: 1fr; gap: 1px; }
}

/* ---------- plans ---------- */
.plan-list { display: flex; flex-direction: column; gap: 8px; }
.plan-item {
  display: flex; align-items: center; gap: 12px; border: 1px solid var(--line);
  border-radius: 8px; padding: 10px 14px; background: #fff;
}
.plan-item .p-subj { font-weight: 700; }
.plan-item .p-meta { color: var(--muted); font-size: 12.5px; }
.plan-item .spacer { flex: 1; }
.plan-item .p-fill { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; }
.p-fill-bar { display: inline-block; width: 80px; height: 6px; border-radius: 3px; background: #e5e7eb; overflow: hidden; }
.p-fill-bar > span { display: block; height: 100%; }

/* ---------- 年間指導計画 全画面エディタ ---------- */
.plan-editor { display: flex; flex-direction: column; }
.pe-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.pe-header .pe-title { font-weight: 700; font-size: 15px; }
.pe-header .spacer { flex: 1; }
.pe-basic { margin-bottom: 14px; border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; }
.pe-basic > summary { cursor: pointer; font-weight: 600; }
.pe-body { display: grid; grid-template-columns: minmax(220px, 300px) 1fr; gap: 16px; align-items: start; }
.pe-units-head { display: flex; align-items: center; justify-content: space-between; }
.pe-units-head h3 { margin: 0 0 8px; }
.plan-unit-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
.plan-unit-item {
  display: flex; align-items: center; gap: 8px; border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 10px; background: #fff; cursor: pointer;
}
.plan-unit-item.selected { border-color: var(--accent); background: var(--accent-soft); }
.plan-unit-item .pu-no {
  flex: 0 0 auto; width: 22px; height: 22px; border-radius: 50%; background: #e5e7eb;
  display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #374151;
}
.plan-unit-item.selected .pu-no { background: var(--accent); color: #fff; }
.plan-unit-item .pu-body { flex: 1; min-width: 0; }
.plan-unit-item .pu-name { display: block; font-weight: 700; font-size: 13.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.plan-unit-item .pu-meta { display: block; color: var(--muted); font-size: 11px; }
.plan-unit-item .pu-ops { flex: 0 0 auto; display: flex; gap: 1px; }

.pe-unit-edit { min-width: 0; border: 1px solid var(--line); border-radius: 10px; padding: 14px; background: #fff; }
.pe-unit-edit .ue-top { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
.pe-unit-edit .ue-hours { width: 90px; }
.pe-unit-edit .field { margin-bottom: 10px; }
.pe-unit-edit textarea { width: 100%; font-family: inherit; font-size: 13.5px; resize: vertical; padding: 6px 8px;
  border: 1px solid var(--line); border-radius: 6px; min-height: 38px; }
.pe-unit-edit .ue-criteria { border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; margin-bottom: 10px; }
.ue-hours-h { margin: 4px 0 8px; }
.hour-cards { display: flex; flex-direction: column; gap: 10px; }
.hour-card { border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 8px; padding: 10px 12px; background: #fafbfc; }
.hour-card .hc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.hour-card .hc-no { font-weight: 700; color: var(--accent); }
.hour-card .hc-ops { display: flex; gap: 1px; }
.hour-card .hc-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.hour-card .hc-vp { width: auto; flex: 0 0 auto; }
.hour-card .hc-vp select { width: 100%; padding: 6px; border: 1px solid var(--line); border-radius: 6px; }
@media (max-width: 760px) {
  .pe-body { grid-template-columns: 1fr; }
}

/* 計画エディタの基本情報。固定4列だと最小幅が約550pxを超えスマホ幅で横にあふれるため、
   入る分だけ段組みする(モーダル約340px幅なら2列に折り返す) */
.plan-form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
.plan-form-grid .field { min-width: 0; }

table.units-table { border-collapse: collapse; width: 100%; margin-top: 8px; }
.units-table th, .units-table td { border: 1px solid var(--line); padding: 5px 8px; font-size: 13px; vertical-align: top; }
.units-table th { background: #f8fafc; }
.units-table input, .units-table textarea {
  width: 100%; border: none; font-family: inherit; font-size: 13px; background: transparent; resize: vertical;
}
.units-table input:focus, .units-table textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; background: #fff; }
.units-table td.num { width: 62px; text-align: center; }
.units-table td.ops { width: 96px; text-align: center; white-space: nowrap; }
.units-table .drag-handle { cursor: grab; color: var(--muted); }

.import-area textarea { width: 100%; min-height: 140px; font-family: Consolas, monospace; font-size: 12px; }
.map-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
.map-grid select { width: 100%; padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px; }

/* ---------- データ画面(保存先別) ---------- */
.data-page { display: flex; flex-direction: column; gap: 14px; max-width: 760px; }
.data-page .data-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.data-page .data-sub { font-size: 12px; margin-top: 8px; }
.data-page .data-explain { padding-left: 18px; margin: 8px 0 0; line-height: 1.7; }
.data-page .data-explain li { margin-bottom: 2px; }
.data-page .data-danger { border-color: #fca5a5; }
.data-page .data-danger h2 { color: var(--danger); }
.data-page .app-id { display: flex; align-items: baseline; gap: 8px; margin: 0 0 6px; }
.data-page .app-id b { font-size: var(--t-md); letter-spacing: .02em; }
.data-page .app-id span { font-size: 12px; color: var(--muted); }

/* ---------- stats ---------- */
table.stats-table { border-collapse: collapse; width: 100%; }
/* 標準時数入力。font-sizeはインラインで書かない(タッチ環境の16px化が負けるため) */
.stats-table input { font-size: 13.5px; }
.stats-table th, .stats-table td { border: 1px solid var(--line); padding: 6px 10px; font-size: 13.5px; text-align: right; }
.stats-table th { background: #f8fafc; text-align: center; }
.stats-table td.subj { text-align: left; font-weight: 600; }
.stats-table tr.over td { background: #fef2f2; }

/* ---------- settings ---------- */
.settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 16px; align-items: start; }
/* 設定は選択カテゴリだけを1カラムで表示する(同時多カード・横スクロールを避ける) */
.settings-grid.cat-view { display: block; max-width: 1000px; }
.settings-grid.cat-view > .panel { display: none; }
.settings-grid.cat-view > .panel.active-cat { display: block; }
table.edit-table { border-collapse: collapse; width: 100%; }
.edit-table th, .edit-table td { border: 1px solid var(--line); padding: 4px 6px; font-size: 13px; }
.edit-table th { background: #f8fafc; font-weight: 600; }
.edit-table input, .edit-table select {
  width: 100%; border: none; font-family: inherit; font-size: 13px; background: transparent;
}
.edit-table input:focus, .edit-table select:focus { outline: 2px solid var(--accent); outline-offset: -1px; background: #fff; }
.edit-table input[type="color"] { padding: 0; height: 24px; cursor: pointer; }
.edit-table td.ops { width: 70px; text-align: center; white-space: nowrap; }

.mode-cards { display: flex; gap: 10px; flex-wrap: wrap; }
.mode-card {
  flex: 1; min-width: 150px; border: 2px solid var(--line); border-radius: 10px; padding: 12px;
  cursor: pointer; background: #fff; text-align: left;
}
.mode-card.selected { border-color: var(--accent); background: #f0f7ff; }
.mode-card .m-title { font-weight: 700; font-size: 14px; display: block; }
.mode-card .m-desc { font-size: 11.5px; color: var(--muted); display: block; margin-top: 4px; line-height: 1.5; }

/* ---------- dropdown menu ---------- */
details.menu { position: relative; }
details.menu summary { list-style: none; user-select: none; }
details.menu summary::-webkit-details-marker { display: none; }
details.menu .menu-items {
  position: absolute; right: 0; top: calc(100% + 4px); z-index: 60;
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
  box-shadow: var(--shadow); padding: 6px; display: flex; flex-direction: column; gap: 2px;
  min-width: 240px;
}
/* メニュー項目は左寄せ。.btn は inline-flex/justify-content:center なので
   text-align だけでは効かない。justify-content:flex-start で確実に左へ。 */
details.menu .menu-items .btn { text-align: left; justify-content: flex-start; }

/* モーダル内の縦並び選択ボタン(時間割選択・まとめて作成など)は左寄せでメニューらしく。
   .btn 既定の中央寄せ(justify-content:center)だと、名前が中央に浮いて不格好になる。 */
.choice-list { display: flex; flex-direction: column; gap: 8px; }
.choice-list > .btn { justify-content: flex-start; text-align: left; }


/* ---------- 中止エントリ ---------- */
/* #6b7280=白背景で4.8:1(WCAG 1.4.3)。中止は取り消し線+「中止」フラグで伝え、文字は読めるまま残す */
.entry.cancelled .e-text, .entry.cancelled .e-note { text-decoration: line-through; color: #6b7280; }
.entry.cancelled .subj-chip { opacity: .7; }

/* ---------- toast ---------- */
#toast-layer { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: rgba(28, 28, 30, .82); color: #fff; border-radius: var(--r-full); padding: 11px 20px; font-size: 13.5px;
  -webkit-backdrop-filter: blur(20px) saturate(180%); backdrop-filter: blur(20px) saturate(180%);
  border: .5px solid rgba(255, 255, 255, .1);
  box-shadow: var(--e-3); animation: toast-in var(--dur-3) var(--ease-out);
}
.toast.error { background: rgba(190, 30, 30, .86); }
@keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ---------- print dialog options ---------- */
.print-options { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; }

/* ---------- v2.0: 分割印刷ボタン・保存表示 ---------- */
.split-btn { display: inline-flex; }
.split-btn .btn { border-radius: 8px 0 0 8px; }
.split-btn .btn.opts { border-radius: 0 8px 8px 0; border-left: 1px solid rgba(255,255,255,.35); padding: 7px 9px; }
.save-indicator { color: #15803d; font-size: 12px; white-space: nowrap; transition: color .3s; }
.save-indicator.saving { color: #b45309; }

/* ---------- ⓘポップオーバー ---------- */
button.info {
  border: none; background: none; color: #64748b; /* 白地3:1以上(WCAG 1.4.11) */ cursor: pointer;
  font-size: 13px; padding: 2px 4px; vertical-align: middle; line-height: 1;
}
button.info:hover { color: var(--accent); }
.popover {
  position: absolute; z-index: 300; max-width: 280px;
  background: #1f2937; color: #fff; font-size: 12.5px; line-height: 1.6;
  border-radius: 8px; padding: 8px 12px; box-shadow: var(--shadow);
}

/* ---------- 初回ガイドカード ---------- */
.onboard-card {
  position: relative;
  background: linear-gradient(135deg, #eff6ff, #f0fdfa);
  border: 1px solid #bfdbfe; border-radius: var(--radius);
  padding: 12px 40px 12px 16px; margin-bottom: 12px;
  display: flex; gap: 24px; flex-wrap: wrap; align-items: center;
}
.oc-step { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: #1e3a5f; }
.oc-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff;
  font-size: 12.5px; font-weight: 700; flex: none;
}
.oc-close {
  position: absolute; top: 6px; right: 8px; border: none; background: none;
  color: #64748b; font-size: 16px; cursor: pointer;
}

/* ---------- 連続入力(ペイント) ---------- */
.paint-bar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  background: var(--panel); border: 1px solid var(--accent); border-radius: var(--radius);
  padding: 8px 14px; margin-bottom: 12px;
}
.paint-hint { font-size: 12.5px; color: var(--accent); font-weight: 600; white-space: nowrap; }
.paint-chips { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; flex: 1; }
.paint-chip, .subject-palette button {
  /* opacityで白へ薄めない(白文字4.5:1設計を保持)。ホバーは brightness(.92) で示す */
  border: 2px solid transparent; border-radius: 6px; color: #fff; font-size: 12px; font-weight: 700;
  padding: 4px 9px; cursor: pointer;
}
.paint-chip:hover { filter: brightness(.94); }
.paint-chip.selected { outline: 2.5px solid #1f2937; outline-offset: 1px; }
.paint-scope {
  border: 1.5px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink);
  font-size: 12px; font-weight: 600; padding: 4px 9px; cursor: pointer;
}
.paint-scope.selected { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
.paint-sep { width: 1px; height: 20px; background: var(--line); margin: 0 4px; }
table.week-grid.painting td.cell:not(.off) { cursor: copy; }
.btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 700; }

.mode-banner {
  background: #fff7ed; border: 1px solid #fdba74; border-radius: var(--radius);
  padding: 8px 16px; margin-bottom: 12px; font-size: 13.5px; color: #9a3412;
  display: flex; align-items: center; gap: 10px;
}
.mode-banner.auto-fill-hint {
  background: #eff6ff; border-color: #93c5fd; color: #1e40af; align-items: flex-start;
}
.mode-banner.auto-fill-hint .ic { flex: none; margin-top: 1px; }
.mode-banner.auto-fill-hint span { flex: 1; line-height: 1.55; }
.mode-banner.auto-fill-hint b { font-weight: 600; }
.mode-banner.auto-fill-hint button { flex: none; align-self: center; }

/* ---------- 専科の学級フィルタ ---------- */
.class-filter { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.class-filter .cf-label { font-size: 12.5px; color: var(--muted); margin-right: 2px; }
.class-filter .cf-chip {
  border: 1px solid var(--line); background: var(--panel); color: var(--ink);
  border-radius: var(--r-full, 999px); padding: 4px 12px; font-size: 13px; cursor: pointer; min-height: 32px;
}
.class-filter .cf-chip:hover { background: var(--accent-50); border-color: var(--accent-300); }
.class-filter .cf-chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

/* ---------- 今日の列 ---------- */
.day-th { cursor: pointer; }
.day-th:hover { background: var(--accent-50); }
.day-head.today { position: relative; }
.day-head.today .dow, .day-head.today .date { color: var(--accent); }
.day-head.today::after {
  content: '今日'; display: inline-block; background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 700; border-radius: 4px; padding: 1px 5px; margin-left: 2px;
}
td.today-col { background: #f5faff; }
td.cell.today-col:hover { background: #e8f3ff; }

/* ---------- 日課セレクト ---------- */
.daypat-select {
  width: 100%; border: none; background: transparent; font-size: 11.5px; color: var(--muted);
  font-family: inherit;
}
.daypat-select.active { color: #b45309; font-weight: 700; }

/* ---------- セル編集モーダル(v2) ---------- */
.entry-editor { border: 1px solid var(--line); border-radius: var(--r-lg); padding: 14px; margin-bottom: 10px; background: var(--panel); box-shadow: var(--e-1); }
/* 教科・学級の選択サマリー(パレットは「変更」で開く) */
.cell-select { margin-bottom: 10px; }
.cell-select > summary { list-style: none; cursor: pointer; }
.cell-select > summary::-webkit-details-marker { display: none; }
.cell-select-summary {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; background: #fafbfc;
}
.cell-select[open] > .cell-select-summary { border-color: var(--accent); background: var(--accent-soft); }
.cell-select-summary .sel-name { font-weight: 700; font-size: 14px; }
.cell-select-summary .sel-name.muted { color: var(--muted); font-weight: 600; }
.cell-select-summary .sel-scope { font-size: 13px; font-weight: 700; color: var(--accent); }
.cell-select-summary .sel-scope.warn { color: var(--danger); }
.cell-select-summary .change-tag {
  margin-left: auto; font-size: 12px; font-weight: 700; color: var(--accent);
  border: 1px solid var(--accent); border-radius: 6px; padding: 2px 8px;
}
.grade-head {
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 700; font-size: 13.5px; margin-bottom: 8px;
}
.guide-chips { display: inline-flex; gap: 4px; align-items: center; }
.guide-btn {
  width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--line);
  background: #fff; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--muted);
}
.guide-btn.selected.g-direct { background: #dbeafe; border-color: #2563eb; color: #1d4ed8; }
.guide-btn.selected.g-indirect { background: #f1f5f9; border-color: #64748b; color: #334155; }
.guide-btn.selected.g-guide { background: #fef3c7; border-color: #d97706; color: #92400e; }
.guide-chip {
  display: inline-block; font-size: 10px; font-weight: 700; border-radius: 4px; padding: 0 4px;
  border: 1px solid currentColor;
}
.guide-chip.g-direct { color: #1d4ed8; }
.guide-chip.g-indirect { color: #475569; }
.guide-chip.g-guide { color: #92400e; }
.fold-label { cursor: pointer; font-size: 12.5px; color: var(--muted); user-select: none; }
details.adv { margin-top: 6px; }
details.adv[open] .fold-label { color: var(--accent); }
.scope-palette { display: flex; flex-wrap: wrap; gap: 5px; }
.scope-palette button {
  border: 1.5px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink);
  font-size: 12.5px; font-weight: 600; padding: 5px 10px; cursor: pointer;
}
.scope-palette button.selected { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
.e-flag.warn { color: #b45309; font-weight: 700; } /* 白地で小サイズ文字4.5:1以上(WCAG 1.4.3) */
.auto-preview.muted { color: var(--muted); border-color: var(--line); background: #f8fafc; }

/* ---------- トーストのアクション ---------- */
.toast-action {
  margin-left: 12px; border: 1px solid rgba(255,255,255,.5); background: none; color: #fff;
  border-radius: 6px; padding: 3px 10px; font-size: 12.5px; cursor: pointer; font-weight: 700;
}
.toast-action:hover { background: rgba(255,255,255,.15); }

/* ---------- 初回セットアップ ---------- */
.onboarding { display: flex; justify-content: center; padding: 48px 16px; }
.ob-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
  box-shadow: var(--shadow); padding: 36px 40px; max-width: 460px; width: 100%;
  text-align: center;
}
.ob-logo { font-size: 40px; }
.ob-logo .ic { width: 46px; height: 46px; color: var(--accent); stroke-width: 1.4; }
.ob-card h1 { font-size: 20px; margin: 8px 0 2px; }
.ob-sub { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
.ob-q { text-align: left; margin-bottom: 20px; }
.ob-label { font-size: 12.5px; font-weight: 700; color: #374151; margin-bottom: 6px; }
.ob-row { display: flex; gap: 8px; align-items: stretch; }
.ob-row select, .ob-row input {
  border: 1px solid var(--line); border-radius: 8px; padding: 8px; font-size: 14px; font-family: inherit;
}
.ob-seg { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; flex: 1; }
.ob-seg button {
  flex: 1; border: none; background: #fff; padding: 9px 4px; font-size: 13.5px; cursor: pointer;
  font-family: inherit; color: var(--muted); white-space: nowrap;
}
.ob-seg button + button { border-left: 1px solid var(--line); }
.ob-seg button.selected { background: var(--accent); color: #fff; font-weight: 700; }
.ob-start { width: 100%; padding: 11px; font-size: 15px; margin-top: 4px; }
.ob-skip { width: 100%; margin-top: 8px; color: var(--muted); }

/* ---------- 文字サイズ「大」 ---------- */
html.ui-large body { zoom: 1.12; }

/* ---------- タッチ環境対応 ---------- */
@media (hover: none) {
  /* ホバーが無い環境では×を常時表示。教科チップと重ならないよう右下に置く */
  td.cell .cell-clear { display: block; top: auto; bottom: 2px; right: 2px; }
}
@media (pointer: coarse) {
  .event-input, .field textarea, .field input[type="text"], .field input[type="number"],
  .field input[type="password"],
  .units-table input, .units-table textarea, .edit-table input, .edit-table select,
  .week-notes textarea, .field select, .ob-row select, .ob-row input, .stats-table input,
  .daypat-select, .week-nav input[type="date"], #bulk-count, [name="bulkGrade"],
  .modal select, .modal input[type="text"], .modal input[type="number"] { font-size: 16px; } /* iOSのズーム暴発防止 */
  .btn.small { padding: 8px 12px; }
  .subject-palette button, .paint-chip, .paint-scope, .scope-palette button, .guide-btn { padding: 8px 12px; min-height: 40px; }
  .guide-btn { width: auto; min-width: 44px; } /* 幅28px固定のままだと文字が潰れタップ目標も不足 */
  .cell-clear { padding: 8px 10px; font-size: 14px; min-width: 44px; min-height: 44px; }
  .oc-close { min-width: 44px; min-height: 44px; }
  .toast-action { padding: 10px 14px; min-height: 44px; }
  button.info { padding: 10px; font-size: 15px; } /* 44px相当のタップ目標 */
  .tabs .tab { min-height: 44px; }
  .week-nav .btn { min-height: 44px; }
  .topbar-actions .btn { min-height: 44px; }
  .ob-seg button { min-height: 44px; }
  .modal-foot .btn { min-height: 44px; }
  .set-chip { min-height: 44px; padding: 8px 14px; }
}

/* ---------- v2.2 ---------- */

/* 週グリッドの最小幅(スマホでセルが潰れない)+ 左列固定 */
table.week-grid { min-width: 622px; }
table.week-grid:has(thead tr:first-child th:nth-child(7)) { min-width: 732px; } /* 土曜あり(6日) */
.week-grid .period-head, .week-grid th.corner {
  position: sticky; left: 0; z-index: 5;
  box-shadow: 1px 0 0 var(--line); /* sticky中もborder相当の線を保つ */
}

/* 横スクロールが必要な表の包み */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
/* スマホ幅で時刻・数値入力が潰れて読めなくならないよう、最小幅を与えて容器内で横スクロールさせる */
.table-scroll .edit-table { min-width: 520px; }

/* ⋯メニューの区切り線(グループ: この週/出力/危険) */
details.menu .menu-sep { height: 1px; background: var(--line); margin: 4px 6px; }
/* メニューの小見出し(週の操作 / 時間割・計画 / 書き出し・提出)。長いメニューを走査しやすく */
details.menu .menu-items .menu-group-label {
  font-size: 11px; font-weight: 700; color: var(--muted);
  letter-spacing: .04em; padding: 9px 10px 3px;
}
details.menu .menu-items .menu-group-label:first-child { padding-top: 4px; }

/* 設定ページの項目ナビ */
.settings-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.set-chip {
  border: 1px solid var(--line); background: var(--panel); border-radius: 999px;
  padding: 5px 12px; font-size: 12.5px; cursor: pointer; font-family: inherit; color: var(--ink);
}
.set-chip:hover { background: var(--gray-100); border-color: var(--gray-300); }
.set-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

/* ガイドカードの完了ステップ */
.oc-step.done { opacity: .6; }
.oc-step.done .oc-num { background: #16a34a; }

/* 曜日ヘッダーの一括操作アフォーダンス */
.day-caret { font-size: 9px; color: #64748b; /* 白地3:1以上(WCAG 1.4.11) */ margin-left: 3px; vertical-align: 1px; }
.day-th:hover .day-caret { color: var(--accent); }

/* キーボード操作のフォーカス表示(セル・曜日ヘッダーは tabindex で到達できる) */
td.cell:focus-visible, .day-th:focus-visible {
  outline: 2px solid var(--accent); outline-offset: -2px;
}

/* ---------- 本時の項目別オーバーライド(ねらい・学習活動・評価規準) ---------- */
.ov-block {
  border: 1px solid var(--accent-200); border-radius: var(--r-lg);
  background: linear-gradient(180deg, var(--accent-50), var(--panel) 64%);
  padding: 12px 14px; margin-bottom: 12px;
}
.ov-head {
  display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px 8px;
  margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--accent-100);
}
.ov-head .ov-kicker {
  font-size: 10px; font-weight: 800; letter-spacing: .04em; color: var(--accent);
  text-transform: none;
}
.ov-head strong { color: var(--gray-800); font-size: var(--t-sm); }
.ov-head .ov-nth { color: var(--ink-2); font-size: 11px; font-weight: 600; }
.ov-head .ov-sub { color: var(--muted); font-size: 11px; }
.ov-head .ov-help { margin-left: auto; }

.ov-field { margin-top: 10px; }
.ov-field:first-of-type { margin-top: 0; }
.ov-flabel {
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  font-size: 11.5px; font-weight: 700; color: var(--ink-2);
}
.ov-flabel b { font-weight: 700; }
.ov-asplan { font-size: 10.5px; font-weight: 600; color: var(--gray-400); }
.ov-badge {
  font-size: 10px; font-weight: 800; color: var(--accent-ink);
  background: var(--accent-100); border-radius: var(--r-full); padding: 1px 8px; letter-spacing: .02em;
}
.ov-reset {
  margin-left: auto; border: 1px solid var(--line-strong); background: var(--panel);
  color: var(--ink-2); border-radius: var(--r-full); font-size: 11px; font-weight: 600;
  padding: 2px 10px; cursor: pointer; transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
}
.ov-reset:hover { background: var(--gray-100); color: var(--ink); }
.ov-input {
  width: 100%; border: 1px solid var(--line-strong); border-radius: var(--r-sm);
  padding: 7px 9px; font-size: 13.5px; font-family: inherit; line-height: 1.55;
  background: var(--panel); color: var(--ink); resize: none; overflow: hidden; min-height: 38px;
  transition: border-color var(--dur-1) var(--ease), box-shadow var(--dur-1) var(--ease);
}
.ov-input::placeholder { color: var(--gray-400); }
.ov-input:focus { outline: none; border-color: var(--accent-300); box-shadow: 0 0 0 3px var(--accent-50); }
.ov-field.is-ov .ov-input { border-color: var(--accent-300); background: var(--panel); }
.ov-field.is-ov .ov-input::placeholder { color: var(--gray-300); }

.ov-vprow { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.ov-vplabel { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--ink-2); }
.ov-vp { display: inline-flex; gap: 4px; background: var(--gray-100); border-radius: var(--r-full); padding: 3px; }
.ov-vp button {
  border: none; background: transparent; border-radius: var(--r-full); cursor: pointer;
  font-size: 12px; font-weight: 700; color: var(--muted); padding: 4px 11px; min-width: 34px;
  transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease), box-shadow var(--dur-1) var(--ease);
}
.ov-vp button.ov-vp-none { min-width: auto; font-weight: 600; }
.ov-vp button:hover { color: var(--ink); }
.ov-vp button.selected { background: var(--panel); color: var(--accent-ink); box-shadow: var(--e-1); }

/* ---------- 上級: 1行表示の全文差し替え折りたたみ ---------- */
.manual-fold { margin-bottom: 12px; }
.manual-fold > summary { list-style: none; }
.manual-fold > summary::-webkit-details-marker { display: none; }
.manual-fold[open] > summary { margin-bottom: 8px; }

/* フォーム入力のフォーカスを統一(青の淡いハロー) */
.field input[type="text"]:focus, .field input[type="number"]:focus,
.field input[type="password"]:focus, .field input[type="time"]:focus,
.field input[type="date"]:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--accent-300); box-shadow: 0 0 0 3px var(--accent-50);
}

/* ---------- 空状態(図＋次の一手を視覚的に) ---------- */
.empty-state { text-align: center; padding: 32px 16px; }
.empty-state .empty-ic { font-size: 44px; line-height: 1; margin-bottom: 10px; filter: saturate(.7); }
.empty-state .empty-title { font-size: var(--t-md); font-weight: 700; margin: 0 0 6px; color: var(--ink); }
.empty-state .empty-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin: 0 auto 16px; max-width: 460px; }
.empty-state .empty-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

/* ---------- アイコン＋ラベルのレイアウト(SVGサイズは .ic で指定) ---------- */
.set-chip { display: inline-flex; align-items: center; gap: 5px; }
.menu-item { display: flex; align-items: center; gap: 8px; }

/* セルの右クリック・クイック操作メニュー(PC) */
.context-menu {
  position: fixed; z-index: 400; min-width: 178px;
  background: var(--panel); border: 1px solid var(--gray-200); border-radius: var(--r-md);
  box-shadow: var(--e-3); padding: 5px; display: flex; flex-direction: column; gap: 1px;
  animation: cm-in var(--dur-1) var(--ease-out);
}
@keyframes cm-in { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: none; } }
.cm-item {
  display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
  border: none; background: none; cursor: pointer; font-family: inherit; font-size: 13.5px;
  color: var(--ink); padding: 7px 10px; border-radius: var(--r-sm);
}
.cm-item .ic { width: 16px; height: 16px; color: var(--ink-2); }
.cm-item:hover, .cm-item:focus-visible { background: var(--gray-100); outline: none; }
.cm-item.danger { color: var(--danger); }
.cm-item.danger .ic { color: var(--danger); }
.cm-item.danger:hover { background: var(--danger-soft); }
.cm-sep { height: 1px; background: var(--line); margin: 4px 6px; }

/* ---------- 曜日の一括操作(アイコン＋説明の二段ボタン) ---------- */
.day-ops { display: flex; flex-direction: column; gap: 8px; }
.day-op { display: flex; align-items: center; justify-content: flex-start; gap: 12px; text-align: left; padding: 10px 14px; }
.day-op .op-ic { font-size: 20px; flex: 0 0 auto; line-height: 1; }
.day-op .op-tx { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.day-op .op-tx b { font-size: 14px; }
.day-op .op-tx small { font-size: 11.5px; color: var(--muted); line-height: 1.4; white-space: normal; }
.day-op.danger .op-tx b { color: var(--danger); }

/* ---------- 日/週 表示切替トグル ---------- */
.view-toggle { display: inline-flex; background: var(--gray-100); border-radius: var(--r-full); padding: 3px; gap: 2px; }
.view-toggle .vt-btn {
  border: none; background: transparent; border-radius: var(--r-full); cursor: pointer;
  font-size: 13px; font-weight: 700; color: var(--muted); padding: 5px 14px; min-width: 40px;
  font-family: inherit;
  transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease), box-shadow var(--dur-1) var(--ease);
}
.view-toggle .vt-btn:hover { color: var(--ink); }
.view-toggle .vt-btn.active { background: var(--panel); color: var(--accent-ink); box-shadow: var(--e-1); }

/* ---------- 週の活用ループ(先週のふりかえり) ---------- */
.loop-card {
